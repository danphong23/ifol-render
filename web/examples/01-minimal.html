<!DOCTYPE html>
<html>
<head>
  <title>ifol-render — 01 Minimal</title>
  <style>
    body { margin:0; background:#111; display:flex; justify-content:center; align-items:center; height:100vh; }
    canvas { border:1px solid #333; }
  </style>
</head>
<body>
  <canvas id="viewport" width="800" height="600"></canvas>
  <!-- Load WASM + SDK -->
  <script type="module">
    import init, { IfolRenderWeb } from './wasm/ifol_render_wasm.js';
    // SDK toolkit — only what you need
    // import { DrawableEntity, FrameBuilder } from 'ifol-render-sdk';
    // For now, inline the builder logic (no build step needed):

    await init();
    const canvas = document.getElementById('viewport');
    const core = await new IfolRenderWeb(canvas, 800, 600, 60);
    core.setup_builtins();

    // ── Step 1: Create entities (pixel-space) ──
    // Background
    const bg = {
      id: 0, x: 0, y: 0, width: 800, height: 600,
      rotation: 0, opacity: 1, blend_mode: 0,
      color: [0.05, 0.05, 0.15, 1],
      shader: 'shapes', textures: [], params: [],
      layer: 0, z_index: 0,
    };
    // Green rectangle
    const rect = {
      id: 1, x: 200, y: 150, width: 400, height: 300,
      rotation: 0.2, opacity: 0.9, blend_mode: 0,
      color: [0.3, 0.9, 0.6, 1],
      shader: 'shapes', textures: [], params: [],
      layer: 1, z_index: 0,
    };
    // Red circle
    const circle = {
      id: 2, x: 500, y: 300, width: 120, height: 120,
      rotation: 0, opacity: 0.8, blend_mode: 0,
      color: [0.9, 0.3, 0.4, 1],
      shader: 'shapes', textures: [], params: [1.0],  // 1.0 = circle
      layer: 2, z_index: 0,
    };

    // ── Step 2: Build Frame JSON ──
    const frame = {
      passes: [{
        output: 'main',
        pass_type: {
          Entities: {
            entities: [bg, rect, circle],
            clear_color: [0, 0, 0, 1],
          },
        },
      }, {
        output: 'screen',
        pass_type: { Output: { input: 'main' } },
      }],
      texture_updates: [],
    };

    // ── Step 3: Render ──
    core.render_frame(JSON.stringify(frame));

    // ── Step 4: Animation (App controls timing) ──
    let time = 0;
    function loop(ts) {
      time += 0.016;
      rect.rotation = Math.sin(time) * 0.5;
      circle.x = 500 + Math.cos(time * 2) * 100;
      circle.y = 300 + Math.sin(time * 2) * 80;
      core.render_frame(JSON.stringify(frame));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
