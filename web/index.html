<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ifol-render ECS Editor</title>
  <style>
    :root {
      --bg: #0f1117; --panel: #181a22; --panel2: #1e2029;
      --border: #2a2d3a; --text: #d4d4d8; --dim: #71717a;
      --accent: #60a5fa; --accent2: #818cf8; --green: #34d399;
      --red: #f87171; --yellow: #fbbf24; --orange: #fb923c;
      --sel: #2563eb33; --sel-border: #3b82f6;
      --radius: 4px; --font: 11px/1.5 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font: var(--font); overflow: hidden; user-select: none; }

    /* ═══ 6-Panel Grid with Timeline Tracks ═══ */
    .app {
      display: grid;
      grid-template-columns: 200px 1fr 260px;
      grid-template-rows: 32px 1fr 140px 36px;
      grid-template-areas:
        "toolbar   toolbar   toolbar"
        "hierarchy viewport  inspector"
        "hierarchy tracks    inspector"
        "controls  controls  controls";
      height: 100vh; gap: 1px; background: #0a0b10;
    }

    /* ── Toolbar ── */
    .toolbar {
      grid-area: toolbar; background: var(--panel);
      display: flex; align-items: center; gap: 4px; padding: 0 6px;
      border-bottom: 1px solid var(--border);
    }
    .toolbar button { background: var(--panel2); color: var(--text); border: 1px solid var(--border); padding: 2px 8px; border-radius: var(--radius); cursor: pointer; font-size: 10px; white-space: nowrap; }
    .toolbar button:hover { background: #2a2d3a; }
    .toolbar button.primary { background: #1d4ed8; border-color: #3b82f6; }
    .toolbar .sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }
    .toolbar .spacer { flex: 1; }
    .toolbar .status { color: var(--accent); font-size: 10px; }
    .toolbar .fps { color: var(--green); font-size: 10px; font-weight: 600; }

    /* ── Hierarchy (left) ── */
    .hierarchy {
      grid-area: hierarchy; background: var(--panel); overflow-y: auto; padding: 4px;
      border-right: 1px solid var(--border);
    }
    .hierarchy .hdr { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: .6px; padding: 4px 6px 2px; display: flex; align-items: center; justify-content: space-between; }
    .hierarchy .hdr button { font-size: 9px; padding: 0 4px; cursor: pointer; background: none; border: none; color: var(--accent); }
    .ent-item {
      padding: 3px 6px; border-radius: var(--radius); cursor: pointer;
      font-size: 11px; display: flex; align-items: center; gap: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ent-item:hover { background: #ffffff08; }
    .ent-item.sel { background: var(--sel); outline: 1px solid var(--sel-border); }
    .ent-item .icon { font-size: 11px; width: 16px; text-align: center; flex-shrink: 0; }
    .ent-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .ent-item.child { padding-left: 20px; }

    /* ── Viewport area (center) ── */
    .viewport-area {
      grid-area: viewport; background: #0a0a0f; display: flex; flex-wrap: wrap; gap: 1px;
      align-content: flex-start; overflow: hidden; position: relative;
    }
    .vp-container {
      flex: 1 1 auto; min-width: 300px; min-height: 200px;
      background: #111318; position: relative; display: flex;
      flex-direction: column;
    }
    .vp-header {
      background: var(--panel); padding: 2px 6px; font-size: 9px;
      color: var(--dim); display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid var(--border);
    }
    .vp-header select { background: var(--bg); color: var(--text); border: 1px solid var(--border); font-size: 9px; padding: 1px 2px; border-radius: 2px; }
    .vp-mode-btn { background: #1e3a5f; color: var(--accent); border: 1px solid #2563eb; font-size: 8px; padding: 1px 6px; border-radius: 2px; cursor: pointer; font-weight: 600; }
    .vp-mode-btn.cam-mode { background: #1a3a2a; color: var(--green); border-color: #059669; }
    .vp-header .label { color: var(--accent); font-weight: 600; }
    .vp-canvas-wrap { flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .vp-canvas-wrap canvas { display: block; max-width: 100%; max-height: 100%; object-fit: contain; }

    /* ── Inspector (right) ── */
    .inspector {
      grid-area: inspector; background: var(--panel); overflow-y: auto; padding: 4px; font-size: 11px;
      border-left: 1px solid var(--border);
    }
    .insp-section { margin-bottom: 6px; }
    .insp-section .shdr {
      font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px;
      padding: 4px 6px 2px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); margin-bottom: 2px;
    }
    .insp-section .shdr button { font-size: 9px; padding: 0 4px; background: none; border: none; color: var(--red); cursor: pointer; }
    .insp-row { display: flex; align-items: center; gap: 4px; padding: 2px 6px; }
    .insp-row label { min-width: 50px; color: var(--dim); font-size: 10px; flex-shrink: 0; }
    .insp-row input[type=number] { width: 52px; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 2px 3px; font-size: 10px; border-radius: 2px; }
    .insp-row input[type=text] { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 2px 4px; font-size: 10px; border-radius: 2px; }
    .insp-row input[type=color] { width: 28px; height: 20px; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; padding: 0; }
    .insp-row input[type=range] { flex: 1; accent-color: var(--accent); height: 3px; }
    .insp-row select { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 2px 3px; font-size: 10px; border-radius: 2px; }
    .insp-empty { color: var(--dim); font-size: 10px; padding: 20px; text-align: center; }
    .add-comp-btn { display: block; width: calc(100% - 12px); margin: 4px 6px; padding: 4px; background: #1e293b; border: 1px dashed var(--border); border-radius: var(--radius); color: var(--accent); font-size: 10px; cursor: pointer; text-align: center; }
    .add-comp-btn:hover { background: #1e3a5f; }

    /* ── Timeline Tracks (new panel) ── */
    .timeline-tracks {
      grid-area: tracks; background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .tl-header {
      display: flex; align-items: center; gap: 4px; padding: 2px 6px;
      background: var(--panel2); border-bottom: 1px solid var(--border);
      font-size: 9px; color: var(--dim); flex-shrink: 0;
    }
    .tl-header .tl-ruler { flex: 1; position: relative; height: 16px; cursor: col-resize; }
    .tl-tracks-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
    .tl-track {
      display: flex; align-items: center; height: 22px; border-bottom: 1px solid #1a1c26;
      cursor: pointer; position: relative;
    }
    .tl-track:hover { background: #ffffff05; }
    .tl-track.sel { background: var(--sel); }
    .tl-track-label { width: 100px; font-size: 9px; color: var(--dim); padding: 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; border-right: 1px solid var(--border); }
    .tl-track-bar-area { flex: 1; position: relative; height: 100%; overflow: hidden; cursor: col-resize; }
    .tl-bar {
      position: absolute; height: 14px; top: 4px;
      border-radius: 3px; font-size: 7px; line-height: 14px;
      padding: 0 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      opacity: 0.85; cursor: grab; display: flex; align-items: center;
    }
    .tl-bar:hover { opacity: 1; }
    .tl-bar.sel { opacity: 1; outline: 1px solid var(--accent); outline-offset: 1px; }
    .tl-bar-handle { position: absolute; top: 0; bottom: 0; width: 6px; cursor: col-resize; z-index: 2; }
    .tl-bar-handle.left { left: 0; border-left: 2px solid rgba(255,255,255,0.4); border-radius: 3px 0 0 3px; }
    .tl-bar-handle.right { right: 0; border-right: 2px solid rgba(255,255,255,0.4); border-radius: 0 3px 3px 0; }
    .tl-bar-handle:hover { background: rgba(255,255,255,0.15); }
    .tl-bar-label { flex: 1; padding: 0 8px; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
    .tl-bar.color { background: #7c3aed; color: #e0d4ff; }
    .tl-bar.video { background: #dc2626; color: #fecaca; }
    .tl-bar.image { background: #059669; color: #a7f3d0; }
    .tl-bar.text { background: #d97706; color: #fef3c7; }
    .tl-bar.cam { background: #1d4ed8; color: #bfdbfe; }
    .tl-bar.comp { background: #6d28d9; color: #ddd6fe; }
    .tl-bar.sel { outline: 2px solid var(--accent); opacity: 1; }
    .tl-playhead {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: var(--red); z-index: 10; pointer-events: none;
    }
    .tl-playhead::before {
      content: ''; position: absolute; top: -2px; left: -4px;
      width: 0; height: 0;
      border-left: 4px solid transparent; border-right: 4px solid transparent;
      border-top: 5px solid var(--red);
    }

    /* ── Timeline controls (bottom bar) ── */
    .timeline-bar {
      grid-area: controls; background: var(--panel);
      display: flex; align-items: center; gap: 6px; padding: 0 8px;
      border-top: 1px solid var(--border);
    }
    .timeline-bar button { background: none; border: none; color: var(--text); cursor: pointer; font-size: 14px; padding: 2px 4px; }
    .timeline-bar input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; }
    .timeline-bar .tinfo { font-size: 10px; color: var(--dim); min-width: 110px; text-align: right; }
    .timeline-bar .dur-input { width: 40px; background: var(--bg); color: var(--text); border: 1px solid var(--border); font-size: 10px; padding: 1px 3px; border-radius: 2px; text-align: center; }

    /* Comp badge */
    .comp-badge { display: inline-block; font-size: 8px; padding: 0 4px; border-radius: 8px; color: #fff; margin-left: 4px; }
    .comp-badge.color { background: #7c3aed; }
    .comp-badge.video { background: #dc2626; }
    .comp-badge.image { background: #059669; }
    .comp-badge.text { background: #d97706; }
    .comp-badge.cam { background: #2563eb; }

    /* ── Popup  ── */
    .popup-menu { position: fixed; background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 4px; z-index: 1000; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .popup-menu .pm-item { padding: 5px 12px; font-size: 11px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; gap: 6px; }
    .popup-menu .pm-item:hover { background: #2a2d3a; }
    .popup-menu .pm-sep { height: 1px; background: var(--border); margin: 3px 0; }

    /* Hidden helpers */
    #hidden-video, #hidden-canvas { display: none; }
  </style>
</head>
<body>
<div class="app">
  <!-- ═══ Toolbar ═══ -->
  <div class="toolbar">
    <button id="btn-new-entity">+ Entity</button>
    <button id="btn-new-camera">+ Camera</button>
    <span class="sep"></span>
    <button id="btn-dup">Dup</button>
    <button id="btn-del">Del</button>
    <span class="sep"></span>
    <button id="btn-add-vp">+ Viewport</button>
    <span class="sep"></span>
    <button id="btn-load-json">Load JSON</button>
    <input type="file" id="load-json-file" accept=".json" style="display:none">
    <button id="btn-export-json">Export JSON</button>
    <span class="sep"></span>
    <button id="btn-load-demo" class="primary">🎬 Demo Scene</button>
    <span class="spacer"></span>
    <span class="fps" id="fps-display">--</span>
    <span class="status" id="status">Loading...</span>
  </div>

  <!-- ═══ Hierarchy ═══ -->
  <div class="hierarchy">
    <div class="hdr">Hierarchy <button id="btn-hier-add" title="New entity">+</button></div>
    <div id="hierarchy-list"></div>
  </div>

  <!-- ═══ Viewports ═══ -->
  <div class="viewport-area" id="viewport-area">
    <div class="vp-container" id="vp-0">
      <div class="vp-header">
        <span class="label">VP 1</span>
        <button id="vp-0-mode" class="vp-mode-btn" title="Toggle Editor/Camera view">Editor</button>
        <select id="vp-0-cam" title="Camera"><option value="cam">cam</option></select>
        <span style="flex:1"></span>
        <span id="vp-0-zoom" style="color:var(--accent);font-size:8px">100%</span>
        <span id="vp-0-info" style="color:#555;font-size:8px">1280×720</span>
      </div>
      <div class="vp-canvas-wrap"><canvas id="canvas-0" width="1280" height="720"></canvas></div>
    </div>
  </div>

  <!-- ═══ Inspector ═══ -->
  <div class="inspector" id="inspector">
    <div class="insp-empty" id="insp-empty">Select an entity</div>
    <div id="insp-content" style="display:none">
      <!-- Filled dynamically -->
    </div>
  </div>

  <!-- ═══ Timeline Tracks ═══ -->
  <div class="timeline-tracks" id="timeline-tracks">
    <div class="tl-header">
      <span style="width:100px;text-align:center">Entity</span>
      <div class="tl-ruler" id="tl-ruler"></div>
    </div>
    <div class="tl-tracks-wrap" id="tl-tracks-wrap">
      <!-- Filled dynamically -->
    </div>
  </div>

  <!-- ═══ Timeline Controls ═══ -->
  <div class="timeline-bar">
    <button id="btn-play" title="Play/Pause (Space)">▶</button>
    <button id="btn-step-back" title="Step back">⏮</button>
    <button id="btn-step-fwd" title="Step forward">⏭</button>
    <input type="range" id="timeline" min="0" max="600" value="0" step="1">
    <span class="tinfo" id="time-display">0.00s / 10.00s</span>
    <span style="color:var(--dim);font-size:9px">dur:</span>
    <input type="number" class="dur-input" id="duration-input" value="10" min="1" max="3600" step="1">
  </div>
</div>

<!-- Hidden helpers for video/image -->
<video id="hidden-video" crossorigin="anonymous" muted></video>
<canvas id="hidden-canvas"></canvas>
<input type="file" id="pick-video" accept="video/*" style="display:none">
<input type="file" id="pick-image" accept="image/*" style="display:none">

<script type="module" src="./ecs-test.js"></script>
</body>
</html>
