<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>iFol V4 Pure ECS Testbed</title>
  <style>
     * { box-sizing: border-box; }
     body { background: #111; color: #eee; font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
     .toolbar { padding: 8px 10px; background: #222; display: flex; gap: 8px; border-bottom: 1px solid #444; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
     .toolbar button { background: #333; color: white; border: 1px solid #555; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 12px; white-space: nowrap; }
     .toolbar button:hover { background: #444; }
     .test-group { display: flex; gap: 4px; background: #2a2a2a; padding: 3px; border-radius: 4px; flex-wrap: wrap; }
     
     /* ─── Main area (flex:1, split horizontal) ─── */
     .main { display: flex; flex: 1; min-height: 0; }
     .left-panel { width: 320px; min-width: 200px; background: #1a1a1a; display: flex; flex-direction: column; }
     
     /* Horizontal resize handle between left-panel and viewport */
     .resize-h { width: 5px; background: #333; cursor: col-resize; flex-shrink: 0; }
     .resize-h:hover, .resize-h.active { background: #60a5fa; }
     
     .viewport { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; min-height: 0; min-width: 200px; overflow: hidden; }
     .viewport canvas#canvasMain { background: #111; }
     /* Editor mode: canvas IS the viewport, no CSS scaling */
     .viewport.editor-mode canvas#canvasMain { display: block; }
     /* Camera mode: fit aspect ratio, centered */
     .viewport.camera-mode canvas#canvasMain { max-width: 100%; max-height: 100%; object-fit: contain; margin: auto; }
     
     textarea.json-editor { width: 100%; flex: 1; background: #050505; color: #4ade80; font-family: 'Consolas', monospace; font-size: 11px; border: none; padding: 8px; resize: none; outline: none; }

     /* ─── Vertical resize handle between main area and timeline ─── */
     .resize-v { height: 5px; background: #333; cursor: row-resize; flex-shrink: 0; }
     .resize-v:hover, .resize-v.active { background: #60a5fa; }

     /* ─── Timeline Panel ─── */
     .timeline-panel { height: 200px; min-height: 80px; background: #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; }
     .timeline-header { height: 28px; background: #252525; border-bottom: 1px solid #444; display: flex; align-items: center; padding: 0 10px; gap: 10px; font-size: 12px; flex-shrink: 0; }
     .timeline-header .breadcrumb { display: flex; gap: 4px; align-items: center; }
     .timeline-header .breadcrumb span { cursor: pointer; color: #60a5fa; }
     .timeline-header .breadcrumb span:hover { text-decoration: underline; }
     .timeline-header .breadcrumb span.current { color: #fff; cursor: default; }
     .timeline-header .breadcrumb span.current:hover { text-decoration: none; }
     .timeline-header .breadcrumb .sep { color: #666; cursor: default; }
     .timeline-header .breadcrumb .sep:hover { text-decoration: none; }
     
     .timeline-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }
     
     /* Labels: has ruler spacer at top + scrollable track labels below */
     .timeline-labels { width: 140px; background: #1e1e1e; border-right: 1px solid #333; flex-shrink: 0; display: flex; flex-direction: column; }
     .timeline-labels-ruler { height: 22px; background: #252525; border-bottom: 1px solid #444; flex-shrink: 0; }
     .timeline-labels-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
     .timeline-labels-scroll::-webkit-scrollbar { width: 0; }
     
     .timeline-label { height: 24px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; color: #aaa; border-bottom: 1px solid #222; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
     .timeline-label:hover { background: #2a2a2a; color: #fff; }
     .timeline-label.selected { background: #1a3a5c; color: #60a5fa; }
     .timeline-label.composition { color: #c084fc; font-weight: bold; }
     
     /* Canvas area: ruler is drawn at top of canvas, tracks below */
     .timeline-canvas-wrap { flex: 1; position: relative; overflow: hidden; }
     .timeline-canvas-wrap canvas { display: block; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btnInit" style="background:#55f; font-weight:bold">🚀 Init V4 Pipeline</button>
    <div style="width:1px; height:20px; background:#555"></div>
    <div class="test-group">
        <button id="btnTestCase1">1. Shapes</button>
        <button id="btnTestCase2">2. Hierarchy</button>
        <button id="btnTestCase3">3. Keyframe</button>
        <button id="btnTestCase4">4. Loop</button>
        <button id="btnTestCase5">5. Opacity</button>
        <button id="btnTestCase6">6. Camera</button>
        <button id="btnTestCase7">7. Morph</button>
        <button id="btnTestCase8">8. Lifespan</button>
        <button id="btnTestCase9">9. Comp Timeline</button>
        <button id="btnTestCase10">10. Nested Comp</button>
        <button id="btnTestCase11">11. Easings</button>
        <button id="btnTestCase12">12. Image</button>
        <button id="btnTestCase13">13. Alignment</button>
        <button id="btnTestCase17">17. AV Sync</button>
    </div>
    <div style="width:1px; height:20px; background:#555"></div>
    <button id="btnUpdateJson" style="background:#059669; font-weight:bold">Apply JSON ➔ ECS</button>
    <label style="display:flex; align-items:center; cursor:pointer; font-size:12px; color:#4ade80;">
        <input type="checkbox" id="chkEditorMode" checked style="margin-right:4px">
        [Editor]
    </label>
    <select id="selSelectMode" style="background:#333; color:white; border:1px solid #555; border-radius:4px; font-size:12px; margin-left:8px; padding:2px 4px; outline:none;">
        <option value="rect">Select Mode: Rect (Layer Bounds)</option>
        <option value="content">Select Mode: Content (Visual Pixels)</option>
    </select>
    <span id="lblStatus" style="font-size:11px; color:#aaa; margin-left:auto">Waiting for Init...</span>
  </div>

  <div class="main" id="mainArea">
    <div class="left-panel" id="leftPanel">
      <div style="padding: 6px 10px; background: #333; font-size: 11px; font-weight: bold; border-bottom:1px solid #444; display:flex; justify-content:space-between; flex-shrink:0;">
        <span>Scene JSON</span>
        <span style="color:#aaa; font-weight:normal" id="lblEntities">0 entities</span>
      </div>
      <textarea id="jsonEditor" class="json-editor" spellcheck="false"></textarea>
    </div>
    <div class="resize-h" id="resizeH"></div>
    <div class="viewport editor-mode" id="viewportArea">
      <div style="position: absolute; top:8px; left:8px; color:#fff; font-size:11px; background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:4px; pointer-events:none; z-index:10;">
        <span style="color:#60a5fa; font-weight:bold">V4 Pure ECS WASM</span><br>
        <span id="lblRenderMs">0.0</span>ms | <span id="lblCanvasSize">1280x720</span>
      </div>
      <canvas id="canvasMain" width="1280" height="720"></canvas>
    </div>
  </div>

  <!-- Vertical resize handle -->
  <div class="resize-v" id="resizeV"></div>

  <!-- Timeline Panel -->
  <div class="timeline-panel" id="timelinePanel">
    <div class="timeline-header">
      <div class="breadcrumb" id="timelineBreadcrumb">
        <span class="current">Root</span>
      </div>
      <div style="margin-left:auto; display:flex; gap:8px; align-items:center">
        <button id="btnPlay" style="font-size:11px; padding:2px 10px">▶ Play</button>
        <button id="btnStop" style="font-size:11px; padding:2px 10px">⏹ Stop</button>
        <span id="lblTime" style="font-family: monospace; font-size:11px; width:120px; text-align:right">0.00 / 10.00s</span>
      </div>
    </div>
    <div class="timeline-body">
      <div class="timeline-labels" id="timelineLabels">
        <div class="timeline-labels-ruler"></div>
        <div class="timeline-labels-scroll" id="timelineLabelsScroll"></div>
      </div>
      <div class="timeline-canvas-wrap" id="timelineCanvasWrap">
        <canvas id="canvasTimeline"></canvas>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
