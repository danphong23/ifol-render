<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ifol-render SDK Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .top-bar h1 { font-size: 14px; color: #e94560; margin-right: 16px; }
    .top-bar button {
      padding: 6px 14px;
      font-size: 12px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .top-bar button:hover { background: #0f3460; }
    .top-bar button.active { background: #e94560; border-color: #e94560; }
    .top-bar input {
      padding: 5px 10px;
      font-size: 12px;
      background: #0a0a1a;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      border-radius: 4px;
      width: 300px;
    }
    .top-bar label { font-size: 12px; color: #888; }

    /* Main Layout */
    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar h3 {
      padding: 10px 12px 6px;
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
    }
    .entity-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .entity-item {
      padding: 6px 10px;
      margin: 2px 0;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .entity-item:hover { background: #1a1a2e; }
    .entity-item.selected { background: #0f3460; border: 1px solid #e94560; }
    .entity-item .type-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: #0a0a1a;
      color: #888;
    }

    /* Viewports */
    .viewport-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
    }
    .viewport-row {
      flex: 1;
      display: flex;
      gap: 4px;
    }
    .viewport-container {
      flex: 1;
      position: relative;
      background: #0a0a1a;
      border: 1px solid #0f3460;
      border-radius: 6px;
      overflow: hidden;
    }
    .viewport-container.camera-view { max-width: 400px; }
    .viewport-label {
      position: absolute;
      top: 6px; left: 10px;
      font-size: 11px;
      color: #888;
      z-index: 10;
      pointer-events: none;
      background: rgba(10,10,26,0.8);
      padding: 2px 8px;
      border-radius: 3px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Properties Panel */
    .properties {
      width: 220px;
      background: #16213e;
      border-left: 1px solid #0f3460;
      padding: 10px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .properties h3 {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .prop-row {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
      gap: 6px;
    }
    .prop-row label {
      font-size: 11px;
      color: #aaa;
      width: 30px;
      flex-shrink: 0;
    }
    .prop-row input {
      flex: 1;
      padding: 4px 6px;
      font-size: 11px;
      background: #0a0a1a;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      border-radius: 3px;
      width: 60px;
    }

    /* Bottom Bar */
    .bottom-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
    }
    .metric {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .metric .val { color: #4ecca3; font-weight: 600; }
    .metric.warn .val { color: #e94560; }

    /* Timeline */
    .timeline {
      height: 40px;
      background: #0a0a1a;
      border-top: 1px solid #0f3460;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
    }
    .timeline button {
      padding: 4px 12px;
      font-size: 12px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
    }
    .timeline button:hover { background: #0f3460; }
    .timeline input[type="range"] {
      flex: 1;
      accent-color: #e94560;
    }
    .timeline .time-display {
      font-size: 12px;
      font-family: monospace;
      color: #4ecca3;
      min-width: 80px;
    }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div class="top-bar">
    <h1>ifol-render SDK Test</h1>
    <button id="btnAddRect">+ Rect</button>
    <button id="btnAddCircle">+ Circle</button>
    <button id="btnAddImage">+ Image</button>
    <button id="btnAddVideo">+ Video</button>
    <input id="assetUrl" placeholder="Asset path (e.g. /path/to/image.png)" />
    <button id="btnParticles">⚡ Particles</button>
    <input id="particleCount" type="number" value="100" style="width:60px" />
    <button id="btnExport" style="margin-left:auto; background:#0f3460;">📦 Export</button>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Entity List Sidebar -->
    <div class="sidebar">
      <h3>Entities</h3>
      <div class="entity-list" id="entityList"></div>
      <div style="padding:8px; border-top:1px solid #0f3460;">
        <button id="btnDeleteSelected" style="width:100%; padding:6px; font-size:11px; background:#3d0000; border:1px solid #600; color:#e94560; border-radius:4px; cursor:pointer;">🗑 Delete Selected</button>
      </div>
    </div>

    <!-- Viewports -->
    <div class="viewport-area">
      <div class="viewport-row">
        <div class="viewport-container" id="editViewportContainer">
          <div class="viewport-label">Edit Viewport (resizable)</div>
          <canvas id="editCanvas"></canvas>
        </div>
        <div class="viewport-container camera-view">
          <div class="viewport-label">Camera View (1920×1080)</div>
          <canvas id="cameraCanvas"></canvas>
        </div>
      </div>
    </div>

    <!-- Properties Panel -->
    <div class="properties" id="propsPanel">
      <h3>Properties</h3>
      <div id="propsContent">
        <p style="font-size:11px; color:#666;">Select an entity</p>
      </div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline">
    <button id="btnPlay">▶ Play</button>
    <button id="btnStop">⏹ Stop</button>
    <span class="time-display" id="timeDisplay">0.00s / 10.00s</span>
    <input type="range" id="scrubber" min="0" max="1000" value="0" />
  </div>

  <!-- Bottom Bar (Metrics) -->
  <div class="bottom-bar">
    <div class="metric"><span>FPS:</span><span class="val" id="metricFps">0</span></div>
    <div class="metric"><span>Render:</span><span class="val" id="metricRender">0ms</span></div>
    <div class="metric"><span>Entities:</span><span class="val" id="metricEntities">0</span></div>
    <div class="metric"><span>Buffer:</span><span class="val" id="metricBuffer">0</span></div>
    <div class="metric"><span>Status:</span><span class="val" id="metricStatus">Init</span></div>
  </div>

  <script type="module">
    // ═══════════════════════════════════════
    // ifol-render SDK Test App
    // ═══════════════════════════════════════

    import init, { IfolRenderWeb } from '../crates/wasm/pkg/ifol_render_wasm.js';

    // ── State ──
    const SCENE_W = 1920, SCENE_H = 1080, FPS = 30, DURATION = 10;
    let editRenderer = null, cameraRenderer = null;
    const entities = new Map(); // id → entity
    let selectedId = null;
    let nextId = 1;
    let playing = false;
    let currentTime = 0;
    let playStartWall = 0, playStartTime = 0;
    let animFrameId = null;

    // Perf metrics
    let frameCount = 0, lastFpsTime = 0, lastRenderMs = 0;

    // Drag state
    let dragging = false, dragEntityId = null, dragStartX = 0, dragStartY = 0, dragEntityStartX = 0, dragEntityStartY = 0;

    // ── Init WASM ──
    async function start() {
      updateStatus('Loading WASM...');
      await init();
      
      // Edit viewport (fits container)
      const editCanvas = document.getElementById('editCanvas');
      const editContainer = document.getElementById('editViewportContainer');
      const editW = editContainer.clientWidth;
      const editH = editContainer.clientHeight;
      editCanvas.width = editW;
      editCanvas.height = editH;
      editRenderer = await new IfolRenderWeb(editCanvas, editW, editH, FPS);
      editRenderer.setup_builtins();

      // Camera viewport (fixed resolution, scaled down)
      const cameraCanvas = document.getElementById('cameraCanvas');
      const camW = 960, camH = 540; // half of 1920x1080 for performance
      cameraCanvas.width = camW;
      cameraCanvas.height = camH;
      cameraRenderer = await new IfolRenderWeb(cameraCanvas, camW, camH, FPS);
      cameraRenderer.setup_builtins();

      updateStatus('Ready');
      
      // Start render loop
      requestAnimationFrame(renderLoop);

      // Handle edit viewport resize
      const resizeObserver = new ResizeObserver(() => {
        const w = editContainer.clientWidth;
        const h = editContainer.clientHeight;
        editCanvas.width = w;
        editCanvas.height = h;
        editRenderer.resize(w, h);
      });
      resizeObserver.observe(editContainer);

      setupEventListeners();
      renderCurrentFrame(); // Initial render
    }

    // ── Entity CRUD ──
    function addEntity(type, props = {}) {
      const id = `entity_${nextId++}`;
      const entity = {
        id,
        type,
        x: props.x ?? Math.random() * (SCENE_W - 200),
        y: props.y ?? Math.random() * (SCENE_H - 200),
        width: props.width ?? 200,
        height: props.height ?? 200,
        color: props.color ?? randomColor(),
        opacity: props.opacity ?? 1.0,
        rotation: props.rotation ?? 0,
        source: props.source ?? null,
        layer: props.layer ?? entities.size,
        startTime: 0,
        duration: DURATION,
        shader: type === 'rect' || type === 'circle' ? 'shapes' : 'composite',
        params: type === 'circle' ? [1.0] : [], // circle has radius param
      };
      entities.set(id, entity);
      updateEntityList();
      renderCurrentFrame();
      return id;
    }

    function removeEntity(id) {
      entities.delete(id);
      if (selectedId === id) selectedId = null;
      updateEntityList();
      updatePropsPanel();
      renderCurrentFrame();
    }

    function updateEntity(id, patch) {
      const e = entities.get(id);
      if (!e) return;
      Object.assign(e, patch);
      renderCurrentFrame();
      if (selectedId === id) updatePropsPanel();
    }

    // ── Flatten ──
    function flattenFrame(time, targetW, targetH) {
      const sx = targetW / SCENE_W;
      const sy = targetH / SCENE_H;

      const flatEntities = [];
      const textureUpdates = [];
      let idx = 0;

      for (const e of entities.values()) {
        if (time < e.startTime || time >= e.startTime + e.duration) continue;

        const flat = {
          id: idx++,
          x: e.x * sx,
          y: e.y * sy,
          width: e.width * sx,
          height: e.height * sy,
          rotation: e.rotation,
          opacity: e.opacity,
          blend_mode: 0,
          color: e.color,
          shader: e.shader,
          textures: [],
          params: e.params,
          layer: e.layer,
          z_index: 0,
        };

        // Texture loading
        if (e.type === 'image' && e.source) {
          const key = `img_${e.id}`;
          textureUpdates.push({ LoadImage: { key, path: e.source } });
          flat.textures = [key];
        } else if (e.type === 'video' && e.source) {
          const key = `vid_${e.id}`;
          const vt = time - e.startTime;
          textureUpdates.push({ DecodeVideoFrame: { key, path: e.source, timestamp_secs: vt } });
          flat.textures = [key];
        }

        flatEntities.push(flat);
      }

      // Selection outline pass
      const passes = [
        { output: 'main', pass_type: { Entities: { entities: flatEntities, clear_color: [0.06, 0.06, 0.12, 1.0] } } },
        { output: 'screen', pass_type: { Output: { input: 'main' } } },
      ];

      return { passes, texture_updates: textureUpdates };
    }

    // ── Render ──
    function renderCurrentFrame() {
      const t0 = performance.now();
      
      // Edit viewport
      const editW = editRenderer ? editRenderer.buffered_count : 0; // just to check
      if (editRenderer) {
        const editCanvas = document.getElementById('editCanvas');
        const frame = flattenFrame(currentTime, editCanvas.width, editCanvas.height);
        editRenderer.render_frame(JSON.stringify(frame));
      }

      // Camera viewport
      if (cameraRenderer) {
        const frame = flattenFrame(currentTime, 960, 540);
        cameraRenderer.render_frame(JSON.stringify(frame));
      }

      lastRenderMs = performance.now() - t0;
    }

    // ── Render Loop ──
    function renderLoop(timestamp) {
      animFrameId = requestAnimationFrame(renderLoop);

      // FPS counting
      frameCount++;
      if (timestamp - lastFpsTime >= 1000) {
        document.getElementById('metricFps').textContent = frameCount;
        frameCount = 0;
        lastFpsTime = timestamp;
      }

      // Playback
      if (playing) {
        const elapsed = (timestamp - playStartWall) / 1000;
        currentTime = playStartTime + elapsed;
        if (currentTime >= DURATION) {
          currentTime = DURATION;
          stopPlayback();
        }
        document.getElementById('scrubber').value = (currentTime / DURATION) * 1000;
        document.getElementById('timeDisplay').textContent = `${currentTime.toFixed(2)}s / ${DURATION.toFixed(2)}s`;
        renderCurrentFrame();
      }

      // Update metrics
      document.getElementById('metricRender').textContent = `${lastRenderMs.toFixed(1)}ms`;
      document.getElementById('metricEntities').textContent = entities.size;
      document.getElementById('metricBuffer').textContent = editRenderer ? editRenderer.buffered_count() : 0;
    }

    function startPlayback() {
      playing = true;
      playStartWall = performance.now();
      playStartTime = currentTime;
      document.getElementById('btnPlay').textContent = '⏸ Pause';
    }

    function stopPlayback() {
      playing = false;
      document.getElementById('btnPlay').textContent = '▶ Play';
    }

    // ── Particle Stress Test ──
    function spawnParticles(count) {
      const startCount = entities.size;
      for (let i = 0; i < count; i++) {
        const t = i / count;
        addEntity('rect', {
          x: SCENE_W / 2 + Math.cos(t * Math.PI * 2) * (200 + Math.random() * 400),
          y: SCENE_H / 2 + Math.sin(t * Math.PI * 2) * (200 + Math.random() * 400),
          width: 10 + Math.random() * 30,
          height: 10 + Math.random() * 30,
          color: [Math.random(), Math.random(), Math.random(), 0.5 + Math.random() * 0.5],
          rotation: Math.random() * Math.PI * 2,
          layer: 100 + i,
        });
      }
      updateStatus(`Spawned ${count} particles (total: ${entities.size})`);
    }

    // ── UI Helpers ──
    function randomColor() {
      return [
        0.2 + Math.random() * 0.8,
        0.2 + Math.random() * 0.8,
        0.2 + Math.random() * 0.8,
        1.0
      ];
    }

    function updateEntityList() {
      const list = document.getElementById('entityList');
      list.innerHTML = '';
      for (const [id, e] of entities) {
        const div = document.createElement('div');
        div.className = `entity-item${selectedId === id ? ' selected' : ''}`;
        div.innerHTML = `<span>${e.id}</span><span class="type-badge">${e.type}</span>`;
        div.onclick = () => { selectedId = id; updateEntityList(); updatePropsPanel(); };
        list.appendChild(div);
      }
    }

    function updatePropsPanel() {
      const content = document.getElementById('propsContent');
      if (!selectedId || !entities.has(selectedId)) {
        content.innerHTML = '<p style="font-size:11px; color:#666;">Select an entity</p>';
        return;
      }
      const e = entities.get(selectedId);
      content.innerHTML = `
        <div class="prop-row"><label>X</label><input type="number" value="${e.x.toFixed(0)}" data-prop="x" /></div>
        <div class="prop-row"><label>Y</label><input type="number" value="${e.y.toFixed(0)}" data-prop="y" /></div>
        <div class="prop-row"><label>W</label><input type="number" value="${e.width.toFixed(0)}" data-prop="width" /></div>
        <div class="prop-row"><label>H</label><input type="number" value="${e.height.toFixed(0)}" data-prop="height" /></div>
        <div class="prop-row"><label>Rot</label><input type="number" step="0.1" value="${e.rotation.toFixed(2)}" data-prop="rotation" /></div>
        <div class="prop-row"><label>α</label><input type="number" step="0.05" min="0" max="1" value="${e.opacity.toFixed(2)}" data-prop="opacity" /></div>
      `;
      content.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('change', () => {
          updateEntity(selectedId, { [inp.dataset.prop]: parseFloat(inp.value) });
        });
      });
    }

    function updateStatus(msg) {
      document.getElementById('metricStatus').textContent = msg;
    }

    // ── Event Listeners ──
    function setupEventListeners() {
      document.getElementById('btnAddRect').onclick = () => addEntity('rect');
      document.getElementById('btnAddCircle').onclick = () => addEntity('circle');
      
      document.getElementById('btnAddImage').onclick = () => {
        const path = document.getElementById('assetUrl').value.trim();
        if (!path) return alert('Enter asset path first');
        addEntity('image', { source: path, width: 400, height: 300 });
      };

      document.getElementById('btnAddVideo').onclick = () => {
        const path = document.getElementById('assetUrl').value.trim();
        if (!path) return alert('Enter asset path first');
        addEntity('video', { source: path, width: 640, height: 360 });
      };

      document.getElementById('btnParticles').onclick = () => {
        const count = parseInt(document.getElementById('particleCount').value) || 100;
        spawnParticles(count);
      };

      document.getElementById('btnDeleteSelected').onclick = () => {
        if (selectedId) removeEntity(selectedId);
      };

      document.getElementById('btnPlay').onclick = () => {
        if (playing) stopPlayback(); else startPlayback();
      };

      document.getElementById('btnStop').onclick = () => {
        stopPlayback();
        currentTime = 0;
        document.getElementById('scrubber').value = 0;
        document.getElementById('timeDisplay').textContent = `0.00s / ${DURATION.toFixed(2)}s`;
        renderCurrentFrame();
      };

      document.getElementById('scrubber').oninput = (ev) => {
        if (playing) stopPlayback();
        currentTime = (ev.target.value / 1000) * DURATION;
        document.getElementById('timeDisplay').textContent = `${currentTime.toFixed(2)}s / ${DURATION.toFixed(2)}s`;
        renderCurrentFrame();
      };

      document.getElementById('btnExport').onclick = async () => {
        updateStatus('Exporting...');
        try {
          const res = await fetch('http://localhost:8000/export', { method: 'POST' });
          const data = await res.json();
          updateStatus(data.status === 'ok' ? 'Export done!' : `Export failed: ${data.error}`);
        } catch (e) {
          updateStatus(`Export error: ${e.message}`);
        }
      };

      // ── Viewport drag ──
      const editCanvas = document.getElementById('editCanvas');

      editCanvas.addEventListener('mousedown', (ev) => {
        const rect = editCanvas.getBoundingClientRect();
        const mx = ev.clientX - rect.left;
        const my = ev.clientY - rect.top;
        // Convert to scene coords
        const sx = SCENE_W / editCanvas.width;
        const sy = SCENE_H / editCanvas.height;
        const sceneX = mx * sx;
        const sceneY = my * sy;

        // Hit test (reverse order = topmost first)
        const sorted = [...entities.values()].reverse();
        for (const e of sorted) {
          if (sceneX >= e.x && sceneX <= e.x + e.width &&
              sceneY >= e.y && sceneY <= e.y + e.height) {
            selectedId = e.id;
            dragging = true;
            dragEntityId = e.id;
            dragStartX = sceneX;
            dragStartY = sceneY;
            dragEntityStartX = e.x;
            dragEntityStartY = e.y;
            updateEntityList();
            updatePropsPanel();
            return;
          }
        }
        // Click on empty space → deselect
        selectedId = null;
        updateEntityList();
        updatePropsPanel();
      });

      editCanvas.addEventListener('mousemove', (ev) => {
        if (!dragging || !dragEntityId) return;
        const rect = editCanvas.getBoundingClientRect();
        const mx = ev.clientX - rect.left;
        const my = ev.clientY - rect.top;
        const sx = SCENE_W / editCanvas.width;
        const sy = SCENE_H / editCanvas.height;
        const sceneX = mx * sx;
        const sceneY = my * sy;

        const dx = sceneX - dragStartX;
        const dy = sceneY - dragStartY;
        updateEntity(dragEntityId, {
          x: dragEntityStartX + dx,
          y: dragEntityStartY + dy,
        });
      });

      editCanvas.addEventListener('mouseup', () => {
        dragging = false;
        dragEntityId = null;
      });

      editCanvas.addEventListener('mouseleave', () => {
        dragging = false;
        dragEntityId = null;
      });
    }

    // ── Start ──
    start().catch(e => {
      console.error('Init failed:', e);
      updateStatus(`Error: ${e.message}`);
    });
  </script>
</body>
</html>
