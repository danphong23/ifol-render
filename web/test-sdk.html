<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ifol-render SDK Test</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

    .top-bar{display:flex;align-items:center;gap:6px;padding:5px 10px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0}
    .top-bar h1{font-size:13px;color:#e94560;margin-right:10px;white-space:nowrap}
    .top-bar button{padding:4px 10px;font-size:11px;border:1px solid #0f3460;background:#1a1a2e;color:#e0e0e0;border-radius:3px;cursor:pointer;white-space:nowrap}
    .top-bar button:hover{background:#0f3460}
    .top-bar input{padding:3px 7px;font-size:11px;background:#0a0a1a;border:1px solid #0f3460;color:#e0e0e0;border-radius:3px}
    .sep{width:1px;height:22px;background:#0f3460}
    #assetUrl{width:200px}
    #particleCount{width:45px;text-align:center}

    .main-content{flex:1;display:flex;overflow:hidden}

    .sidebar{width:180px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;flex-shrink:0}
    .sidebar h3{padding:7px 8px 3px;font-size:10px;text-transform:uppercase;color:#555;letter-spacing:1px}
    .entity-list{flex:1;overflow-y:auto;padding:2px 4px}
    .entity-item{padding:3px 6px;margin:1px 0;border-radius:3px;font-size:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:1px solid transparent}
    .entity-item:hover{background:#1a1a2e}
    .entity-item.selected{background:#0f3460;border-color:#e94560}
    .entity-item .badge{font-size:8px;padding:1px 4px;border-radius:2px;background:#0a0a1a;color:#555}
    .sidebar-footer{padding:4px;border-top:1px solid #0f3460}
    .sidebar-footer button{width:100%;padding:4px;font-size:9px;background:#2d0000;border:1px solid #500;color:#e94560;border-radius:2px;cursor:pointer}

    .viewport-area{flex:1;display:flex;overflow:hidden;padding:4px;gap:0}
    .viewport-wrap{position:relative;overflow:hidden;background:#0a0a1a;border:1px solid #0f3460;border-radius:3px}
    #editViewportWrap{flex:1}
    #cameraViewportWrap{width:340px;flex-shrink:0;display:flex;flex-direction:column}
    .viewport-label{position:absolute;top:3px;left:6px;font-size:9px;color:#444;z-index:5;background:rgba(10,10,26,.85);padding:1px 5px;border-radius:2px;pointer-events:none}
    .canvas-container{position:relative;width:100%;height:100%}
    #cameraViewportWrap .canvas-container{display:flex;align-items:center;justify-content:center;background:#050510}
    canvas{display:block}
    #editCanvas{width:100%;height:100%}
    #selectionOverlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2}

    #splitter{width:5px;cursor:col-resize;background:#0f3460;flex-shrink:0;z-index:10;transition:background .15s}
    #splitter:hover,#splitter.active{background:#e94560}

    .properties{width:190px;background:#16213e;border-left:1px solid #0f3460;padding:6px;flex-shrink:0;overflow-y:auto}
    .properties h3{font-size:10px;text-transform:uppercase;color:#555;letter-spacing:1px;margin-bottom:4px}
    .prop-row{display:flex;align-items:center;margin-bottom:3px;gap:3px}
    .prop-row label{font-size:9px;color:#777;width:22px;flex-shrink:0}
    .prop-row input{flex:1;padding:2px 4px;font-size:10px;background:#0a0a1a;border:1px solid #0f3460;color:#e0e0e0;border-radius:2px}

    .timeline{height:32px;background:#0a0a1a;border-top:1px solid #0f3460;display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
    .timeline button{padding:3px 8px;font-size:10px;background:#1a1a2e;border:1px solid #0f3460;color:#e0e0e0;border-radius:3px;cursor:pointer}
    .timeline button:hover{background:#0f3460}
    .timeline input[type="range"]{flex:1;accent-color:#e94560}
    .time-display{font-size:10px;font-family:monospace;color:#4ecca3;min-width:80px}

    .bottom-bar{display:flex;align-items:center;gap:12px;padding:3px 12px;background:#16213e;border-top:1px solid #0f3460;font-size:9px;color:#555;flex-shrink:0}
    .metric{display:flex;gap:2px}.metric .v{color:#4ecca3;font-weight:600}
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>ifol-render SDK Test</h1>
    <button id="btnAddRect">+ Rect</button>
    <button id="btnAddCircle">+ Circle</button>
    <div class="sep"></div>
    <button id="btnAddImage">+ Image</button>
    <button id="btnAddVideo">+ Video</button>
    <input id="assetUrl" placeholder="Asset path (C:/file.png)" />
    <div class="sep"></div>
    <button id="btnParticles">⚡ Particles</button>
    <input id="particleCount" type="number" value="100" />
    <button id="btnAnimEntity">🔄 Anim</button>
    <div class="sep"></div>
    <button id="btnClearAll" style="color:#e94560">✕ Clear</button>
    <button id="btnExport" style="margin-left:auto;background:#0f3460">📦 Export</button>
  </div>

  <div class="main-content">
    <div class="sidebar">
      <h3>Entities</h3>
      <div class="entity-list" id="entityList"></div>
      <div class="sidebar-footer"><button id="btnDelete">🗑 Delete Selected</button></div>
    </div>
    <div class="viewport-area">
      <div class="viewport-wrap" id="editViewportWrap">
        <div class="viewport-label" id="editLabel">Edit Viewport</div>
        <div class="canvas-container">
          <canvas id="editCanvas"></canvas>
          <canvas id="selectionOverlay"></canvas>
        </div>
      </div>
      <div id="splitter"></div>
      <div class="viewport-wrap" id="cameraViewportWrap">
        <div class="viewport-label" id="cameraLabel">Camera View</div>
        <div class="canvas-container" id="cameraCanvasContainer">
          <canvas id="cameraCanvas"></canvas>
        </div>
      </div>
    </div>
    <div class="properties">
      <h3>Properties</h3>
      <div id="propsContent"><p style="font-size:9px;color:#444">Select an entity</p></div>
    </div>
  </div>

  <div class="timeline">
    <button id="btnPlay">▶ Play</button>
    <button id="btnStop">⏹ Stop</button>
    <span class="time-display" id="timeDisplay">0.00 / 10.00</span>
    <input type="range" id="scrubber" min="0" max="1000" value="0" />
  </div>

  <div class="bottom-bar">
    <div class="metric">FPS:<span class="v" id="mFps">0</span></div>
    <div class="metric">Render:<span class="v" id="mRender">0ms</span></div>
    <div class="metric">Entities:<span class="v" id="mEntities">0</span></div>
    <div class="metric">Anims:<span class="v" id="mAnimated">0</span></div>
    <div class="metric">Zoom:<span class="v" id="mZoom">100%</span></div>
    <div class="metric">Pan:<span class="v" id="mPan">0,0</span></div>
    <div class="metric">Status:<span class="v" id="mStatus">Init</span></div>
  </div>

  <script type="module">
    import init, { IfolRenderWeb } from '../crates/wasm/pkg/ifol_render_wasm.js';

    // ═══ Constants (scene in "units" — maps to export resolution) ═══
    const SCENE_W = 1920, SCENE_H = 1080, FPS = 30, DURATION = 10;
    const ASSET_BASE = 'http://localhost:8000/asset?path=';
    const CAM_BORDER = 12; // pixels — how thick the camera border hit zone is

    // ═══ State ═══
    let editRenderer = null, cameraRenderer = null;
    const entities = new Map();
    let selectedId = null, nextId = 1;
    let playing = false, currentTime = 0;
    let playStartWall = 0, playStartTime = 0;
    let cameraEntityId = null;

    // Animation registry: entityId → { type, ...params, t0 (start time) }
    const anims = new Map();

    // Viewport transform (edit viewport only)
    let vpZoom = 1, vpPanX = 0, vpPanY = 0;

    // Interaction state
    let drag = null, splitterDrag = false, vpDrag = null;
    let fpsCount = 0, lastFpsTick = 0, lastRenderMs = 0;

    // ═══ Init ═══
    async function start() {
      setStatus('Loading WASM...');
      await init();

      const editCanvas = document.getElementById('editCanvas');
      syncEditSize();
      editRenderer = await new IfolRenderWeb(editCanvas, editCanvas.width, editCanvas.height, FPS);
      editRenderer.setup_builtins();

      const camCanvas = document.getElementById('cameraCanvas');
      syncCamSize();
      cameraRenderer = await new IfolRenderWeb(camCanvas, camCanvas.width, camCanvas.height, FPS);
      cameraRenderer.setup_builtins();

      createCameraEntity();
      setStatus('Ready — scroll to zoom, middle-click to pan');
      setupEvents();
      requestAnimationFrame(loop);
    }

    // ═══ Canvas sizing ═══
    function syncEditSize() {
      const wrap = document.getElementById('editViewportWrap');
      const c = document.getElementById('editCanvas');
      const o = document.getElementById('selectionOverlay');
      c.width = wrap.clientWidth;
      c.height = wrap.clientHeight;
      o.width = c.width; o.height = c.height;
      if (editRenderer) editRenderer.resize(c.width, c.height);
      document.getElementById('editLabel').textContent = `Edit Viewport (${c.width}×${c.height})`;
    }

    function syncCamSize() {
      const container = document.getElementById('cameraCanvasContainer');
      const c = document.getElementById('cameraCanvas');
      const cw = container.clientWidth, ch = container.clientHeight;
      const aspect = 16 / 9;
      let w, h;
      if (cw / ch > aspect) { h = ch; w = Math.round(h * aspect); }
      else { w = cw; h = Math.round(w / aspect); }
      c.width = w; c.height = h;
      c.style.width = w + 'px'; c.style.height = h + 'px';
      if (cameraRenderer) cameraRenderer.resize(w, h);
      document.getElementById('cameraLabel').textContent = `Camera (${w}×${h})`;
    }

    // ═══ Camera entity ═══
    function createCameraEntity() {
      cameraEntityId = addEntity('rect', {
        x: 0, y: 0, width: SCENE_W, height: SCENE_H,
        color: [1, 1, 1, 0.06], layer: 9999,
      }, '📷 camera');
    }
    function getCamRect() {
      const c = entities.get(cameraEntityId);
      return c ? { x: c.x, y: c.y, w: c.width, h: c.height } : { x: 0, y: 0, w: SCENE_W, h: SCENE_H };
    }

    // ═══ Entity CRUD ═══
    function addEntity(type, p = {}, label = null) {
      const id = `e${nextId++}`;
      entities.set(id, {
        id, type,
        label: label || `${type}_${nextId - 1}`,
        x: p.x ?? rand(0, SCENE_W - 200),
        y: p.y ?? rand(0, SCENE_H - 200),
        width: p.width ?? 200, height: p.height ?? 200,
        color: p.color ?? rndColor(),
        opacity: p.opacity ?? 1, rotation: p.rotation ?? 0,
        source: p.source ?? null,
        layer: p.layer ?? entities.size,
        startTime: 0, duration: DURATION,
        shader: (type === 'rect' || type === 'circle') ? 'shapes' : 'composite',
        params: type === 'circle' ? [1.0] : [],
      });
      refreshList();
      return id;
    }
    function removeEntity(id) {
      entities.delete(id); anims.delete(id);
      if (selectedId === id) { selectedId = null; refreshProps(); }
      if (cameraEntityId === id) cameraEntityId = null;
      refreshList();
    }

    // ═══ DETERMINISTIC Animation System ═══
    // All animations are computed from (currentTime - t0), NOT from delta accumulation.
    // Same currentTime = same visual result, always.

    /** Deterministic bounce: compute position at absolute time via reflection */
    function bouncePos(start, v, t, min, max) {
      if (Math.abs(v) < 0.001) return Math.max(min, Math.min(start, max));
      const range = max - min;
      if (range <= 0) return min;
      let p = start + v * t - min;
      const period = 2 * range;
      p = ((p % period) + period) % period;
      if (p > range) p = period - p;
      return p + min;
    }

    function addOrbitAnim(id, radius = 150, speed = 1) {
      const e = entities.get(id); if (!e) return;
      anims.set(id, {
        type: 'orbit', t0: currentTime,
        cx: e.x + e.width / 2, cy: e.y + e.height / 2,
        radius, speed,
      });
    }
    function addBounceAnim(id, vx = null, vy = null) {
      const e = entities.get(id); if (!e) return;
      anims.set(id, {
        type: 'bounce', t0: currentTime,
        x0: e.x, y0: e.y,
        vx: vx ?? (100 + Math.random() * 300) * (Math.random() > .5 ? 1 : -1),
        vy: vy ?? (100 + Math.random() * 300) * (Math.random() > .5 ? 1 : -1),
        ew: e.width, eh: e.height,
      });
    }
    function addPulseAnim(id, speed = 2) {
      const e = entities.get(id); if (!e) return;
      anims.set(id, {
        type: 'pulse', t0: currentTime,
        baseCx: e.x + e.width / 2, baseCy: e.y + e.height / 2,
        baseW: e.width, baseH: e.height, speed,
      });
    }

    /** Compute all animated entity positions at the given absolute time */
    function computeAnimations(t) {
      for (const [id, a] of anims) {
        const e = entities.get(id);
        if (!e) { anims.delete(id); continue; }
        const dt = t - a.t0;

        switch (a.type) {
          case 'orbit': {
            const angle = dt * a.speed * Math.PI * 2;
            e.x = a.cx + Math.cos(angle) * a.radius - e.width / 2;
            e.y = a.cy + Math.sin(angle) * a.radius - e.height / 2;
            e.rotation = angle;
            break;
          }
          case 'bounce': {
            e.x = bouncePos(a.x0, a.vx, dt, 0, SCENE_W - a.ew);
            e.y = bouncePos(a.y0, a.vy, dt, 0, SCENE_H - a.eh);
            break;
          }
          case 'pulse': {
            const s = 0.7 + 0.6 * Math.sin(dt * a.speed * Math.PI * 2);
            e.width = a.baseW * s;
            e.height = a.baseH * s;
            e.x = a.baseCx - e.width / 2;
            e.y = a.baseCy - e.height / 2;
            break;
          }
        }
      }
    }

    // ═══ Flatten (unit coords → pixel coords) ═══
    // Uses UNIFORM scaling: min(sx, sy) to preserve aspect ratio.
    // Entities are centered in the render target if aspect differs.
    function flatten(time, targetW, targetH, region = null, vp = null) {
      const r = region || { x: 0, y: 0, w: SCENE_W, h: SCENE_H };
      const zoom = vp?.zoom ?? 1;
      const panX = vp?.panX ?? 0;
      const panY = vp?.panY ?? 0;

      // Uniform scale: fit region into target, preserving aspect
      const scaleX = targetW / r.w;
      const scaleY = targetH / r.h;
      const scale = Math.min(scaleX, scaleY) * zoom;
      // Center offset
      const ox = (targetW - r.w * scale) / 2 + panX * scale;
      const oy = (targetH - r.h * scale) / 2 + panY * scale;

      const flatEnts = [];
      const texUp = [];
      let idx = 0;

      for (const e of entities.values()) {
        if (time < e.startTime || time >= e.startTime + e.duration) continue;
        if (region && e.id === cameraEntityId) continue; // hide camera in camera view

        flatEnts.push({
          id: idx++,
          x: (e.x - r.x) * scale + ox,
          y: (e.y - r.y) * scale + oy,
          width: e.width * scale,
          height: e.height * scale,
          rotation: e.rotation,
          opacity: e.opacity,
          blend_mode: 0,
          color: e.color,
          shader: e.shader,
          textures: [],
          params: [...e.params],
          layer: e.layer,
          z_index: 0,
        });

        if (e.type === 'image' && e.source) {
          const k = `img_${e.id}`;
          texUp.push({ LoadImage: { key: k, path: e.source } });
          flatEnts[flatEnts.length - 1].textures = [k];
        } else if (e.type === 'video' && e.source) {
          const k = `vid_${e.id}`;
          texUp.push({ DecodeVideoFrame: { key: k, path: e.source, timestamp_secs: time - e.startTime } });
          flatEnts[flatEnts.length - 1].textures = [k];
        }
      }

      return {
        passes: [
          { output: 'main', pass_type: { Entities: { entities: flatEnts, clear_color: [0.04, 0.04, 0.08, 1] } } },
          { output: 'screen', pass_type: { Output: { input: 'main' } } },
        ],
        texture_updates: texUp,
      };
    }

    // ═══ Selection Overlay ═══
    function drawOverlay() {
      const c = document.getElementById('selectionOverlay');
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, c.width, c.height);
      if (!selectedId) return;
      const e = entities.get(selectedId);
      if (!e) return;

      // Convert entity scene coords to canvas pixels (with viewport)
      const scale0 = Math.min(c.width / SCENE_W, c.height / SCENE_H) * vpZoom;
      const ox = (c.width - SCENE_W * scale0) / 2 + vpPanX * scale0;
      const oy = (c.height - SCENE_H * scale0) / 2 + vpPanY * scale0;
      const px = e.x * scale0 + ox, py = e.y * scale0 + oy;
      const pw = e.width * scale0, ph = e.height * scale0;

      ctx.save();
      ctx.strokeStyle = selectedId === cameraEntityId ? '#4ecca3' : '#e94560';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 3]);
      ctx.strokeRect(px, py, pw, ph);

      // Corner handles
      ctx.setLineDash([]);
      ctx.fillStyle = ctx.strokeStyle;
      const hs = 6;
      for (const [hx, hy] of [[px, py], [px + pw, py], [px, py + ph], [px + pw, py + ph]])
        ctx.fillRect(hx - hs / 2, hy - hs / 2, hs, hs);

      // Label
      const lbl = `${e.label || e.id}  (${Math.round(e.x)}, ${Math.round(e.y)})`;
      ctx.font = '10px Segoe UI, sans-serif';
      const tw = ctx.measureText(lbl).width;
      ctx.fillStyle = selectedId === cameraEntityId ? 'rgba(78,204,163,.85)' : 'rgba(233,69,96,.85)';
      ctx.fillRect(px, py - 15, tw + 8, 13);
      ctx.fillStyle = '#fff';
      ctx.fillText(lbl, px + 4, py - 4);

      // Camera: rule-of-thirds grid
      if (selectedId === cameraEntityId) {
        ctx.strokeStyle = 'rgba(78,204,163,.3)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        for (let i = 1; i < 3; i++) {
          ctx.beginPath(); ctx.moveTo(px + pw * i / 3, py); ctx.lineTo(px + pw * i / 3, py + ph); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(px, py + ph * i / 3); ctx.lineTo(px + pw, py + ph * i / 3); ctx.stroke();
        }
      }
      ctx.restore();
    }

    // ═══ Render ═══
    function renderFrame() {
      const t0 = performance.now();
      computeAnimations(currentTime);

      if (editRenderer) {
        const ec = document.getElementById('editCanvas');
        const f = flatten(currentTime, ec.width, ec.height, null, { zoom: vpZoom, panX: vpPanX, panY: vpPanY });
        editRenderer.render_frame(JSON.stringify(f));
      }
      if (cameraRenderer) {
        const cc = document.getElementById('cameraCanvas');
        const cam = getCamRect();
        const f = flatten(currentTime, cc.width, cc.height, cam);
        cameraRenderer.render_frame(JSON.stringify(f));
      }
      drawOverlay();
      lastRenderMs = performance.now() - t0;
    }

    // ═══ Main Loop ═══
    function loop(ts) {
      requestAnimationFrame(loop);
      fpsCount++;
      if (ts - lastFpsTick >= 1000) { document.getElementById('mFps').textContent = fpsCount; fpsCount = 0; lastFpsTick = ts; }

      if (playing) {
        currentTime = playStartTime + (ts - playStartWall) / 1000;
        if (currentTime >= DURATION) { currentTime = 0; playStartTime = 0; playStartWall = ts; }
        document.getElementById('scrubber').value = (currentTime / DURATION) * 1000;
        document.getElementById('timeDisplay').textContent = `${currentTime.toFixed(2)} / ${DURATION.toFixed(2)}`;
      }

      renderFrame();

      document.getElementById('mRender').textContent = lastRenderMs.toFixed(1) + 'ms';
      document.getElementById('mEntities').textContent = entities.size;
      document.getElementById('mAnimated').textContent = anims.size;
      document.getElementById('mZoom').textContent = (vpZoom * 100).toFixed(0) + '%';
      document.getElementById('mPan').textContent = `${vpPanX.toFixed(0)},${vpPanY.toFixed(0)}`;
    }

    // ═══ Hit test helpers ═══
    function canvasToScene(canvasX, canvasY, canvas) {
      const scale = Math.min(canvas.width / SCENE_W, canvas.height / SCENE_H) * vpZoom;
      const ox = (canvas.width - SCENE_W * scale) / 2 + vpPanX * scale;
      const oy = (canvas.height - SCENE_H * scale) / 2 + vpPanY * scale;
      return { x: (canvasX - ox) / scale, y: (canvasY - oy) / scale };
    }

    /** Camera entity: hit only on border (within borderPx pixels of edge) */
    function hitTestCameraBorder(sceneX, sceneY, borderScene) {
      const c = entities.get(cameraEntityId);
      if (!c) return false;
      const inOuter = sceneX >= c.x - borderScene && sceneX <= c.x + c.width + borderScene &&
                      sceneY >= c.y - borderScene && sceneY <= c.y + c.height + borderScene;
      const inInner = sceneX >= c.x + borderScene && sceneX <= c.x + c.width - borderScene &&
                      sceneY >= c.y + borderScene && sceneY <= c.y + c.height - borderScene;
      return inOuter && !inInner;
    }

    // ═══ Particles ═══
    function spawnParticles(n) {
      for (let i = 0; i < n; i++) {
        const t = i / n;
        const id = addEntity('rect', {
          x: SCENE_W / 2 + Math.cos(t * Math.PI * 2) * (200 + Math.random() * 400),
          y: SCENE_H / 2 + Math.sin(t * Math.PI * 2) * (200 + Math.random() * 400),
          width: 8 + Math.random() * 24, height: 8 + Math.random() * 24,
          color: [Math.random(), Math.random(), Math.random(), .4 + Math.random() * .6],
          rotation: Math.random() * Math.PI * 2,
          layer: 100 + entities.size,
        });
        addBounceAnim(id);
      }
      setStatus(`Spawned ${n} particles (total: ${entities.size})`);
    }

    // ═══ Events ═══
    function setupEvents() {
      document.getElementById('btnAddRect').onclick = () => addEntity('rect');
      document.getElementById('btnAddCircle').onclick = () => addEntity('circle');
      document.getElementById('btnAddImage').onclick = async () => {
        const p = document.getElementById('assetUrl').value.trim();
        if (!p) return alert('Enter asset path');
        addEntity('image', { source: p, width: 400, height: 300 });
        try {
          const res = await fetch(`${ASSET_BASE}${encodeURIComponent(p)}`);
          if (res.ok) {
            const buf = new Uint8Array(await res.arrayBuffer());
            editRenderer.cache_image(p, buf);
            cameraRenderer.cache_image(p, buf);
            setStatus(`Cached: ${p}`);
          }
        } catch (e) { setStatus(`Error: ${e.message}`); }
      };
      document.getElementById('btnAddVideo').onclick = () => {
        const p = document.getElementById('assetUrl').value.trim();
        if (!p) return alert('Enter asset path');
        addEntity('video', { source: p, width: 640, height: 360 });
      };
      document.getElementById('btnParticles').onclick = () => spawnParticles(parseInt(document.getElementById('particleCount').value) || 100);
      document.getElementById('btnAnimEntity').onclick = () => {
        const id = addEntity('rect', {
          x: SCENE_W / 2 - 40, y: SCENE_H / 2 - 40, width: 80, height: 80,
          color: [.2, .8, 1, .9],
        }, '🔄 anim');
        const r = Math.random();
        if (r < .33) addOrbitAnim(id, 150 + Math.random() * 200, .5 + Math.random());
        else if (r < .66) addBounceAnim(id);
        else addPulseAnim(id);
      };
      document.getElementById('btnClearAll').onclick = () => {
        entities.clear(); anims.clear(); selectedId = null; nextId = 1;
        vpZoom = 1; vpPanX = 0; vpPanY = 0;
        refreshList(); refreshProps(); createCameraEntity();
      };
      document.getElementById('btnDelete').onclick = () => { if (selectedId) removeEntity(selectedId); };

      // Playback
      document.getElementById('btnPlay').onclick = () => {
        if (playing) { playing = false; document.getElementById('btnPlay').textContent = '▶ Play'; }
        else { playing = true; playStartWall = performance.now(); playStartTime = currentTime; document.getElementById('btnPlay').textContent = '⏸ Pause'; }
      };
      document.getElementById('btnStop').onclick = () => {
        playing = false; currentTime = 0;
        document.getElementById('btnPlay').textContent = '▶ Play';
        document.getElementById('scrubber').value = 0;
        document.getElementById('timeDisplay').textContent = `0.00 / ${DURATION.toFixed(2)}`;
      };
      document.getElementById('scrubber').oninput = (ev) => {
        if (playing) { playing = false; document.getElementById('btnPlay').textContent = '▶ Play'; }
        currentTime = (ev.target.value / 1000) * DURATION;
        document.getElementById('timeDisplay').textContent = `${currentTime.toFixed(2)} / ${DURATION.toFixed(2)}`;
      };
      document.getElementById('btnExport').onclick = async () => {
        setStatus('Exporting...');
        try { const r = await fetch('http://localhost:8000/export', { method: 'POST' }); const d = await r.json(); setStatus(d.status === 'ok' ? 'Done!' : d.error); }
        catch (e) { setStatus(e.message); }
      };

      // ── Canvas: click/drag ──
      const ec = document.getElementById('editCanvas');

      ec.addEventListener('mousedown', (ev) => {
        if (ev.button === 1) { // middle click → pan viewport
          vpDrag = { startX: ev.clientX, startY: ev.clientY, vpX0: vpPanX, vpY0: vpPanY };
          ev.preventDefault();
          return;
        }
        if (ev.button !== 0) return;

        const rect = ec.getBoundingClientRect();
        const s = canvasToScene(ev.clientX - rect.left, ev.clientY - rect.top, ec);
        const borderScene = CAM_BORDER / (Math.min(ec.width / SCENE_W, ec.height / SCENE_H) * vpZoom);

        // Hit test: camera border first (highest layer)
        if (cameraEntityId && hitTestCameraBorder(s.x, s.y, borderScene)) {
          selectedId = cameraEntityId;
          const c = entities.get(cameraEntityId);
          drag = { id: cameraEntityId, sx: s.x, sy: s.y, ex: c.x, ey: c.y };
          refreshList(); refreshProps(); return;
        }

        // Hit test: other entities (reverse layer order, skip camera)
        const sorted = [...entities.values()].filter(e => e.id !== cameraEntityId).sort((a, b) => b.layer - a.layer);
        for (const e of sorted) {
          if (s.x >= e.x && s.x <= e.x + e.width && s.y >= e.y && s.y <= e.y + e.height) {
            selectedId = e.id;
            drag = { id: e.id, sx: s.x, sy: s.y, ex: e.x, ey: e.y };
            refreshList(); refreshProps(); return;
          }
        }
        selectedId = null; drag = null;
        refreshList(); refreshProps();
      });

      ec.addEventListener('mousemove', (ev) => {
        // Viewport pan (middle mouse)
        if (vpDrag) {
          const scale = Math.min(ec.width / SCENE_W, ec.height / SCENE_H) * vpZoom;
          vpPanX = vpDrag.vpX0 + (ev.clientX - vpDrag.startX) / scale;
          vpPanY = vpDrag.vpY0 + (ev.clientY - vpDrag.startY) / scale;
          return;
        }
        // Entity drag
        if (!drag) return;
        const rect = ec.getBoundingClientRect();
        const s = canvasToScene(ev.clientX - rect.left, ev.clientY - rect.top, ec);
        const e = entities.get(drag.id);
        if (e) { e.x = drag.ex + (s.x - drag.sx); e.y = drag.ey + (s.y - drag.sy); }
      });

      window.addEventListener('mouseup', () => { drag = null; vpDrag = null; splitterDrag = false; document.getElementById('splitter').classList.remove('active'); });
      ec.addEventListener('mouseleave', () => { drag = null; });

      // Viewport zoom (scroll wheel)
      ec.addEventListener('wheel', (ev) => {
        ev.preventDefault();
        const zoomFactor = ev.deltaY < 0 ? 1.1 : 1 / 1.1;
        const newZoom = Math.max(0.1, Math.min(10, vpZoom * zoomFactor));

        // Zoom toward mouse position
        const rect = ec.getBoundingClientRect();
        const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
        const s = canvasToScene(mx, my, ec);
        vpZoom = newZoom;
        // Adjust pan so scene point under mouse stays put
        const s2 = canvasToScene(mx, my, ec);
        vpPanX += (s2.x - s.x);
        vpPanY += (s2.y - s.y);
      }, { passive: false });

      // Splitter
      const splitter = document.getElementById('splitter');
      splitter.addEventListener('mousedown', (ev) => { splitterDrag = true; splitter.classList.add('active'); ev.preventDefault(); });
      window.addEventListener('mousemove', (ev) => {
        if (!splitterDrag) return;
        const area = document.querySelector('.viewport-area').getBoundingClientRect();
        const camW = Math.max(200, Math.min(area.width - 250, area.width - (ev.clientX - area.left)));
        document.getElementById('cameraViewportWrap').style.width = camW + 'px';
        syncEditSize(); syncCamSize();
      });

      // Resize observer
      const ro = new ResizeObserver(() => { syncEditSize(); syncCamSize(); });
      ro.observe(document.getElementById('editViewportWrap'));
      ro.observe(document.getElementById('cameraCanvasContainer'));
    }

    // ═══ UI ═══
    function rand(a, b) { return a + Math.random() * (b - a); }
    function rndColor() { return [.2 + Math.random() * .8, .2 + Math.random() * .8, .2 + Math.random() * .8, 1]; }
    function setStatus(s) { document.getElementById('mStatus').textContent = s; }

    function refreshList() {
      const el = document.getElementById('entityList');
      el.innerHTML = '';
      for (const [id, e] of entities) {
        const d = document.createElement('div');
        d.className = `entity-item${selectedId === id ? ' selected' : ''}`;
        const ico = anims.has(id) ? ' 🔄' : id === cameraEntityId ? ' 📷' : '';
        d.innerHTML = `<span>${e.label}${ico}</span><span class="badge">${e.type}</span>`;
        d.onclick = () => { selectedId = id; refreshList(); refreshProps(); };
        el.appendChild(d);
      }
    }
    function refreshProps() {
      const el = document.getElementById('propsContent');
      if (!selectedId || !entities.has(selectedId)) { el.innerHTML = '<p style="font-size:9px;color:#444">Select an entity</p>'; return; }
      const e = entities.get(selectedId);
      el.innerHTML = `
        <div class="prop-row"><label>X</label><input type="number" value="${e.x.toFixed(0)}" data-p="x"/></div>
        <div class="prop-row"><label>Y</label><input type="number" value="${e.y.toFixed(0)}" data-p="y"/></div>
        <div class="prop-row"><label>W</label><input type="number" value="${e.width.toFixed(0)}" data-p="width"/></div>
        <div class="prop-row"><label>H</label><input type="number" value="${e.height.toFixed(0)}" data-p="height"/></div>
        <div class="prop-row"><label>Rot</label><input type="number" step="0.1" value="${e.rotation.toFixed(2)}" data-p="rotation"/></div>
        <div class="prop-row"><label>α</label><input type="number" step="0.05" min="0" max="1" value="${e.opacity.toFixed(2)}" data-p="opacity"/></div>`;
      el.querySelectorAll('input').forEach(inp => {
        inp.onchange = () => { const e2 = entities.get(selectedId); if (e2) e2[inp.dataset.p] = parseFloat(inp.value); };
      });
    }

    start().catch(e => { console.error(e); setStatus(`Error: ${e.message}`); });
  </script>
</body>
</html>
