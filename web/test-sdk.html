<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ifol-render SDK Test</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
    .top-bar{display:flex;align-items:center;gap:6px;padding:5px 10px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0}
    .top-bar h1{font-size:13px;color:#e94560;margin-right:10px;white-space:nowrap}
    .top-bar button{padding:4px 10px;font-size:11px;border:1px solid #0f3460;background:#1a1a2e;color:#e0e0e0;border-radius:3px;cursor:pointer;white-space:nowrap}
    .top-bar button:hover{background:#0f3460}
    .top-bar input{padding:3px 7px;font-size:11px;background:#0a0a1a;border:1px solid #0f3460;color:#e0e0e0;border-radius:3px}
    .sep{width:1px;height:22px;background:#0f3460}
    #assetUrl{width:200px}
    #particleCount{width:45px;text-align:center}

    .main-content{flex:1;display:flex;overflow:hidden}
    .sidebar{width:180px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;flex-shrink:0}
    .sidebar h3{padding:7px 8px 3px;font-size:10px;text-transform:uppercase;color:#555;letter-spacing:1px}
    .entity-list{flex:1;overflow-y:auto;padding:2px 4px}
    .entity-item{padding:3px 6px;margin:1px 0;border-radius:3px;font-size:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:1px solid transparent}
    .entity-item:hover{background:#1a1a2e}
    .entity-item.selected{background:#0f3460;border-color:#e94560}
    .entity-item .badge{font-size:8px;padding:1px 4px;border-radius:2px;background:#0a0a1a;color:#555}
    .sidebar-footer{padding:4px;border-top:1px solid #0f3460}
    .sidebar-footer button{width:100%;padding:4px;font-size:9px;background:#2d0000;border:1px solid #500;color:#e94560;border-radius:2px;cursor:pointer}

    .viewport-area{flex:1;display:flex;overflow:hidden;padding:4px;gap:0}
    .viewport-wrap{position:relative;overflow:hidden;background:#0a0a1a;border:1px solid #0f3460;border-radius:3px}
    #editViewportWrap{flex:1}
    #cameraViewportWrap{width:340px;flex-shrink:0;display:flex;flex-direction:column}
    .viewport-label{position:absolute;top:3px;left:6px;font-size:9px;color:#444;z-index:5;background:rgba(10,10,26,.85);padding:1px 5px;border-radius:2px;pointer-events:none}
    .canvas-container{position:relative;width:100%;height:100%}
    #cameraViewportWrap .canvas-container{display:flex;align-items:center;justify-content:center;background:#050510}
    canvas{display:block}
    #editCanvas{width:100%;height:100%;image-rendering:auto}
    #selectionOverlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2}

    #splitter{width:5px;cursor:col-resize;background:#0f3460;flex-shrink:0;z-index:10;transition:background .15s}
    #splitter:hover,#splitter.active{background:#e94560}

    .properties{width:190px;background:#16213e;border-left:1px solid #0f3460;padding:6px;flex-shrink:0;overflow-y:auto}
    .properties h3{font-size:10px;text-transform:uppercase;color:#555;letter-spacing:1px;margin-bottom:4px}
    .prop-row{display:flex;align-items:center;margin-bottom:3px;gap:3px}
    .prop-row label{font-size:9px;color:#777;width:22px;flex-shrink:0}
    .prop-row input{flex:1;padding:2px 4px;font-size:10px;background:#0a0a1a;border:1px solid #0f3460;color:#e0e0e0;border-radius:2px}

    /* Export Modal */
    .modal-overlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,.7); z-index:9999; justify-content:center; align-items:center; }
    .modal-overlay.active { display:flex; }
    .modal { background:#16213e; border:1px solid #4ecca3; border-radius:8px; padding:20px; width:420px; max-height:80vh; overflow-y:auto; }
    .modal h2 { margin:0 0 16px; color:#4ecca3; font-size:16px; }
    .modal .field { margin-bottom:10px; }
    .modal .field label { display:block; font-size:10px; color:#888; margin-bottom:3px; text-transform:uppercase; }
    .modal .field input, .modal .field select { width:100%; background:#0f1a30; border:1px solid #333; color:#ccc; padding:6px 8px; border-radius:4px; font-size:12px; box-sizing:border-box; }
    .modal .field-row { display:flex; gap:8px; }
    .modal .field-row .field { flex:1; }
    .modal .actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }
    .modal .actions button { padding:6px 16px; border:none; border-radius:4px; cursor:pointer; font-size:12px; }
    .modal .btn-export { background:#4ecca3; color:#0f0f0f; font-weight:bold; }
    .modal .btn-cancel { background:#333; color:#ccc; }

    .timeline{height:32px;background:#0a0a1a;border-top:1px solid #0f3460;display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
    .timeline button{padding:3px 8px;font-size:10px;background:#1a1a2e;border:1px solid #0f3460;color:#e0e0e0;border-radius:3px;cursor:pointer}
    .timeline button:hover{background:#0f3460}
    .timeline input[type="range"]{flex:1;accent-color:#e94560}
    .time-display{font-size:10px;font-family:monospace;color:#4ecca3;min-width:80px}

    .bottom-bar{display:flex;align-items:center;gap:12px;padding:3px 12px;background:#16213e;border-top:1px solid #0f3460;font-size:9px;color:#555;flex-shrink:0}
    .metric{display:flex;gap:2px}.metric .v{color:#4ecca3;font-weight:600}
  </style>
</head>
<body>
  <div class="top-bar">

  <div class="main-content">
    <div class="sidebar">

      <div class="viewport-wrap" id="cameraViewportWrap">

          <canvas id="cameraCanvas"></canvas>
        </div>
      </div>
    </div>
    <div class="properties">

      <div id="propsContent"><p style="font-size:9px;color:#444">Select an entity</p></div>
    </div>

  <!-- Export Settings Modal -->
  <div class="modal-overlay" id="exportModal">
    <div class="modal">
      <h2>📦 Export Settings</h2>
      <div class="field">
        <label>Output Filename</label>
        <input id="expFilename" value="export.mp4" />
      </div>
      <div class="field">
        <label>Output Directory</label>
        <input id="expDirectory" placeholder="Leave empty for temp dir" />
      </div>
      <div class="field">
        <label>FFmpeg Path (optional)</label>
        <input id="expFfmpeg" placeholder="ffmpeg (uses system PATH)" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Width (px)</label>
          <input id="expWidth" type="number" value="1920" />
        </div>
        <div class="field">
          <label>Height (px)</label>
          <input id="expHeight" type="number" value="1080" />
        </div>
        <div class="field">
          <label>FPS</label>
          <input id="expFps" type="number" value="30" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Codec</label>
          <select id="expCodec">
            <option value="h264" selected>H.264 (mp4)</option>
            <option value="h265">H.265 (mp4)</option>
            <option value="vp9">VP9 (webm)</option>
            <option value="prores">ProRes (mov)</option>
            <option value="png">PNG sequence</option>
          </select>
        </div>
        <div class="field">
          <label>Preset</label>
          <select id="expPreset">
            <option value="ultrafast">ultrafast</option>
            <option value="fast">fast</option>
            <option value="medium" selected>medium</option>
            <option value="slow">slow</option>
            <option value="veryslow">veryslow</option>

        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>CRF (Quality, 0=best, 51=worst)</label>
          <input id="expCrf" type="number" value="23" min="0" max="51" />
        </div>
        <div class="field">
          <label>Pixel Format</label>
          <select id="expPixFmt">
            <option value="yuv420p" selected>yuv420p</option>
            <option value="yuv444p">yuv444p</option>
            <option value="rgb24">rgb24</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>🎧 Audio Clip (optional — file path on backend)</label>
        <input id="expAudioPath" placeholder="C:/music/bgm.mp3" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Audio Volume</label>
          <input id="expAudioVol" type="number" value="1.0" step="0.1" min="0" max="1" />
        </div>
        <div class="field">
          <label>Audio Start (s)</label>
          <input id="expAudioStart" type="number" value="0" step="0.1" />
        </div>
        <div class="field">
          <label>Fade In (s)</label>
          <input id="expAudioFadeIn" type="number" value="0" step="0.1" />
        </div>
        <div class="field">
          <label>Fade Out (s)</label>
          <input id="expAudioFadeOut" type="number" value="0" step="0.5" />
        </div>
      </div>
      <div class="actions">
        <button class="btn-cancel" onclick="document.getElementById('exportModal').classList.remove('active')">Cancel</button>
        <button class="btn-export" id="btnDoExport">🚀 Start Export</button>
      </div>
    </div>
  </div>

  <div class="timeline">
    <button id="btnPlay">▶ Play</button>
    <button id="btnStop">⏹ Stop</button>
    <span class="time-display" id="timeDisplay">0.00 / 10.00</span>
    <input type="range" id="scrubber" min="0" max="1000" value="0" />
    <span style="font-size:9px;color:#888;margin-left:4px">🔊</span>
    <input type="range" id="volumeSlider" min="0" max="100" value="80" style="width:60px;accent-color:#4ecca3" />
    <button id="btnMute" style="font-size:10px;padding:2px 5px;background:transparent;border:none;color:#e0e0e0;cursor:pointer">🔊</button>
  </div>

  <div class="bottom-bar">
    <div class="metric">FPS:<span class="v" id="mFps">0</span></div>
    <div class="metric">Render:<span class="v" id="mRender">0ms</span></div>
    <div class="metric">Entities:<span class="v" id="mEntities">0</span></div>
    <div class="metric">Anims:<span class="v" id="mAnimated">0</span></div>
    <div class="metric">Zoom:<span class="v" id="mZoom">100%</span></div>
    <div class="metric">🔊<span class="v" id="mAudio">0</span></div>
    <div class="metric" style="margin-left:auto">Quality:<input type="range" id="renderScaleSlider" min="25" max="100" value="100" style="width:60px;accent-color:#4ecca3;vertical-align:middle"><span class="v" id="mScale">100%</span></div>
    <div class="metric">Status:<span class="v" id="mStatus">Init</span></div>
  </div>

  <script type="module">
    // ═══════════════════════════════════════════════════════
    // Test Page — App Layer
    //
    // Uses SDK modules (Scene, RenderView, FreeCamera, BoundCamera,
    // AssetManager, Timeline). Pumps Frame JSON → Core WASM → GPU.
    //
    // SDK produces data. This page consumes it.
    // ═══════════════════════════════════════════════════════

    import init, { IfolRenderWeb } from '../crates/wasm/pkg/ifol_render_wasm.js';
    import { Scene } from '../sdk/src/scene.ts';
    import { FreeCamera, BoundCamera } from '../sdk/src/camera.ts';
    import { RenderView } from '../sdk/src/render-view.ts';
    import { AssetManager } from '../sdk/src/assets.ts';
    import { Timeline } from '../sdk/src/timeline.ts';

    // ═══ Config ═══
    const SCENE_W = 1920, SCENE_H = 1080;
    const PPU = 1, DURATION = 10;
    const ASSET_SERVER = 'http://localhost:8000/asset?path=';
    const EXPORT_FPS = 30;

    // ═══ SDK instances (shared) ═══
    let scene = null;        // Scene — entity model
    let editCamera = null;   // FreeCamera — edit viewport
    let boundCamera = null;  // BoundCamera — camera preview
    let editView = null;     // RenderView — edit viewport
    let camView = null;      // RenderView — camera preview
    let assets = null;       // AssetManager — shared cache
    let timeline = null;     // Timeline — shared playback

    // ═══ App Layer state ═══
    let editCore = null, camCore = null; // Core WASM instances
    let selectedId = null, nextId = 1;
    let renderScale = 1.0;

    // Camera entity (App displays camera region as visual overlay)
    let cameraEntityId = null;
    const CAM_BORDER_UNITS = 20;

    // Animation (App-specific, NOT in SDK)
    const anims = new Map();

    // Audio preview state
    let audioPreview = null; // AudioPreview instance

    // Interaction
    let drag = null, splitterDrag = false, vpDrag = null;
    let fpsCount = 0, lastFpsTick = 0, lastRenderMs = 0;

    // ═══ Web Audio Preview ═══
    // Uses Web Audio API + HTML5 <video> elements for real-time audio playback.
    // Syncs to the SDK Timeline state (play/pause/seek/stop).
    class AudioPreview {
      constructor() {
        this.ctx = null; // AudioContext (created on user gesture)
        this.masterGain = null;
        this.volume = 0.8;
        this.muted = false;
        this.sources = []; // {type:'video'|'audio', el, gain, path, startTime, endTime, offset}
        this.audioClips = []; // extra audio clips {path, startTime, volume, buffer}
        this.activeNodes = []; // currently playing AudioBufferSourceNode
      }

      _ensureCtx() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.masterGain = this.ctx.createGain();
          this.masterGain.gain.value = this.volume;
          this.masterGain.connect(this.ctx.destination);
        }
        if (this.ctx.state === 'suspended') this.ctx.resume();
        return this.ctx;
      }

      setVolume(v) {
        this.volume = Math.max(0, Math.min(1, v));
        if (this.masterGain) this.masterGain.gain.value = this.muted ? 0 : this.volume;
        // Update video element volumes
        for (const src of this.sources) {
          if (src.el && src.type === 'video') src.el.volume = this.muted ? 0 : this.volume * (src.clipVolume || 1);
        }
      }

      toggleMute() {
        this.muted = !this.muted;
        this.setVolume(this.volume);
        return this.muted;
      }

      // Scan scene for video entities and register their audio
      syncVideoSources(scene) {
        // Remove stale entries
        this.sources = this.sources.filter(s => s.type !== 'video');
        for (const e of scene.allEntities()) {
          if (e.type === 'video' && e.source) {
            // Get video element from SDK AssetManager
            const va = assets?.getVideo(e.source);
            const video = va?.element;
            if (video) {
              // Track this video as audio source
              this.sources.push({
                type: 'video',
                el: video,
                path: e.source,
                startTime: e.startTime ?? 0,
                endTime: (e.startTime ?? 0) + (e.duration ?? DURATION),
                offset: 0,
                clipVolume: 1.0,
              });
            }
          }
        }
        this._updateMetric();
      }

      // Add an external audio clip (e.g. background music)
      async addAudioClip(path, startTime = 0, volume = 1.0) {
        const ctx = this._ensureCtx();
        try {
          setStatus(`Loading audio: ${path.split(/[\\/]/).pop()}...`);
          const res = await fetch(`${ASSET_SERVER}${encodeURIComponent(path)}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const arrayBuf = await res.arrayBuffer();
          const audioBuffer = await ctx.decodeAudioData(arrayBuf);
          const clip = { path, startTime, volume, buffer: audioBuffer, duration: audioBuffer.duration };
          this.audioClips.push(clip);
          // Also add as source for tracking
          this.sources.push({
            type: 'audio',
            path, startTime, endTime: startTime + audioBuffer.duration,
            offset: 0, clipVolume: volume, buffer: audioBuffer,
          });
          this._updateMetric();
          setStatus(`🎵 Audio loaded: ${path.split(/[\\/]/).pop()} (${audioBuffer.duration.toFixed(1)}s)`);
          return clip;
        } catch (e) {
          setStatus(`Audio error: ${e.message}`);
          return null;
        }
      }

      // Play from a specific time position
      playFrom(timeSeconds) {
        const ctx = this._ensureCtx();
        this.stopAll();

        // 1. Video elements: unmute + seek + play
        for (const src of this.sources) {
          if (src.type === 'video' && src.el) {
            if (timeSeconds >= src.startTime && timeSeconds < src.endTime) {
              const videoTime = (timeSeconds - src.startTime) + src.offset;
              src.el.muted = false;
              src.el.volume = this.muted ? 0 : this.volume * (src.clipVolume || 1);
              src.el.currentTime = videoTime;
              src.el.play().catch(() => {});
            } else {
              src.el.muted = true;
              src.el.pause();
            }
          }
        }

        // 2. AudioBuffer clips: schedule via Web Audio API
        for (const src of this.sources) {
          if (src.type === 'audio' && src.buffer) {
            if (timeSeconds < src.endTime) {
              const source = ctx.createBufferSource();
              source.buffer = src.buffer;
              const gain = ctx.createGain();
              gain.gain.value = src.clipVolume || 1;
              source.connect(gain);
              gain.connect(this.masterGain);

              const clipOffset = Math.max(0, timeSeconds - src.startTime);
              const delay = Math.max(0, src.startTime - timeSeconds);
              source.start(ctx.currentTime + delay, clipOffset);
              this.activeNodes.push({ source, gain });
            }
          }
        }
      }

      pause() {
        // Pause video elements
        for (const src of this.sources) {
          if (src.type === 'video' && src.el) {
            src.el.pause();
          }
        }
        // Disconnect AudioBuffer nodes (cannot resume — will restart on play)
        this.stopAudioNodes();
      }

      stopAll() {
        for (const src of this.sources) {
          if (src.type === 'video' && src.el) {
            src.el.muted = true;
            src.el.pause();
          }
        }
        this.stopAudioNodes();
      }

      stopAudioNodes() {
        for (const n of this.activeNodes) {
          try { n.source.stop(); } catch (_) {}
          try { n.source.disconnect(); } catch (_) {}
          try { n.gain.disconnect(); } catch (_) {}
        }
        this.activeNodes = [];
      }

      totalSources() {
        return this.sources.length;
      }

      _updateMetric() {
        const el = document.getElementById('mAudio');
        if (el) el.textContent = this.sources.length;
      }
    }

    // ═══ Init ═══
    async function start() {
      setStatus('Loading WASM...');
      await init();

      // SDK: create shared instances
      scene = new Scene({ ppu: PPU, duration: DURATION });
      timeline = new Timeline(DURATION);

      // SDK: cameras
      const editWrap = document.getElementById('editViewportWrap');
      editCamera = new FreeCamera({
        centerX: SCENE_W / 2, centerY: SCENE_H / 2, zoom: 1,
        screenWidth: editWrap.clientWidth, screenHeight: editWrap.clientHeight,
        ppu: PPU,
      });
      boundCamera = new BoundCamera(0, 0, SCENE_W, SCENE_H);

      // Core WASM: 2 GPU instances (App Layer owns GPU)
      const editCanvas = document.getElementById('editCanvas');
      syncEditSize();
      editCore = await new IfolRenderWeb(editCanvas, editCanvas.width, editCanvas.height, EXPORT_FPS);
      editCore.setup_builtins();

      const camCanvas = document.getElementById('cameraCanvas');
      syncCamSize();
      camCore = await new IfolRenderWeb(camCanvas, camCanvas.width, camCanvas.height, EXPORT_FPS);
      camCore.setup_builtins();

      // SDK: asset manager (App injects cache→GPU bridge)
      assets = new AssetManager({
        ppu: PPU,
        urlResolver: (p) => `${ASSET_SERVER}${encodeURIComponent(p)}`,
        coreCache: (key, data) => { editCore.cache_image(key, data); camCore.cache_image(key, data); },
        coreVideoCache: (key, t, data, w, h) => { editCore.cache_video_frame(key, t, data, w, h); camCore.cache_video_frame(key, t, data, w, h); },
        coreClearVideo: () => { editCore.clear_video_frames(); camCore.clear_video_frames(); },
      });

      // SDK: render views (Scene × Camera → Frame JSON)
      editView = new RenderView(scene, editCamera, {
        displayWidth: editCanvas.clientWidth || editCanvas.width,
        displayHeight: editCanvas.clientHeight || editCanvas.height,
        renderScale,
      });
      camView = new RenderView(scene, boundCamera, {
        displayWidth: camCanvas.clientWidth || camCanvas.width,
        displayHeight: camCanvas.clientHeight || camCanvas.height,
        renderScale,
      });

      // App: camera entity (visual overlay — NOT SDK camera)
      createCameraEntity();
      camView.excludeIds.add(cameraEntityId);

      setStatus('Ready — scroll=zoom, middle-click=pan');

      // App: audio preview
      audioPreview = new AudioPreview();

      setupEvents();
      requestAnimationFrame(loop);
    }

    // ═══ Canvas sizing (App Layer) ═══
    function syncEditSize() {
      const wrap = document.getElementById('editViewportWrap');
      const c = document.getElementById('editCanvas');
      const o = document.getElementById('selectionOverlay');
      const cssW = wrap.clientWidth, cssH = wrap.clientHeight;

      // Anchor top-left via FreeCamera
      editCamera?.anchorTopLeft(cssW, cssH);

      c.style.width = cssW + 'px'; c.style.height = cssH + 'px';
      const backW = Math.round(cssW * renderScale);
      const backH = Math.round(cssH * renderScale);
      c.width = backW; c.height = backH;
      o.width = cssW; o.height = cssH;
      if (editCore) editCore.resize(backW, backH);
      if (editView) { editView.displayWidth = cssW; editView.displayHeight = cssH; editView.renderScale = renderScale; }
      document.getElementById('editLabel').textContent = `Edit (${cssW}×${cssH} → ${backW}×${backH})`;
    }
    function syncCamSize() {
      const container = document.getElementById('cameraCanvasContainer');
      const c = document.getElementById('cameraCanvas');
      const cw = container.clientWidth, ch = container.clientHeight;
      const aspect = 16 / 9;
      let w, h;
      if (cw / ch > aspect) { h = ch; w = Math.round(h * aspect); }
      else { w = cw; h = Math.round(w / aspect); }
      const backW = Math.round(w * renderScale);
      const backH = Math.round(h * renderScale);
      c.width = backW; c.height = backH;
      c.style.width = w + 'px'; c.style.height = h + 'px';
      if (camCore) camCore.resize(backW, backH);
      if (camView) { camView.displayWidth = w; camView.displayHeight = h; camView.renderScale = renderScale; }
      document.getElementById('cameraLabel').textContent = `Camera (${w}×${h} → ${backW}×${backH})`;
    }

    // ═══ Camera entity overlay (App owns this, NOT SDK) ═══
    function createCameraEntity() {
      cameraEntityId = addEntity('rect', {
        x: 0, y: 0, width: SCENE_W, height: SCENE_H,
        color: [1, 1, 1, 0.06], layer: 9999,
      }, '📷 camera');
    }
    function syncCameraFromEntity() {
      const e = scene.getEntity(cameraEntityId);
      if (e) boundCamera.setFromEntity(e); // Sync SDK BoundCamera from entity
    }

    // ═══ Entity CRUD (via SDK Scene) ═══
    function addEntity(type, p = {}, label = null) {
      const id = `e${nextId++}`;
      scene.addEntity({
        id, type,
        label: label || `${type}_${nextId - 1}`,
        x: p.x ?? rand(0, SCENE_W - 200),
        y: p.y ?? rand(0, SCENE_H - 200),
        width: p.width ?? 200, height: p.height ?? 200,
        color: p.color ?? rndColor(),
        opacity: p.opacity ?? 1, rotation: p.rotation ?? 0,
        blendMode: 'normal',
        source: p.source ?? undefined,
        sourcePath: p.sourcePath ?? undefined,
        layer: p.layer ?? scene.entityCount(),
        startTime: 0, duration: DURATION,
        shader: (type === 'rect' || type === 'circle') ? 'shapes' : 'composite',
        params: type === 'circle' ? [1.0] : [],
      });
      refreshList();
      return id;
    }
    function removeEntity(id) {
      scene.removeEntity(id);
      anims.delete(id);
      camView?.excludeIds.delete(id);
      if (selectedId === id) { selectedId = null; refreshProps(); }
      if (cameraEntityId === id) cameraEntityId = null;
      refreshList();
    }

    // ═══ App Animation (procedural — NOT SDK) ═══
    function bouncePos(start, v, t, min, max) {
      if (Math.abs(v) < 0.001) return Math.max(min, Math.min(start, max));
      const range = max - min; if (range <= 0) return min;
      let p = start + v * t - min;
      const period = 2 * range;
      p = ((p % period) + period) % period;
      if (p > range) p = period - p;
      return p + min;
    }
    function addBounceAnim(id, vx = null, vy = null) {
      const e = scene.getEntity(id); if (!e) return;
      anims.set(id, { type: 'bounce', t0: timeline.currentTime, x0: e.x, y0: e.y,
        vx: vx ?? (100+Math.random()*300)*(Math.random()>.5?1:-1),
        vy: vy ?? (100+Math.random()*300)*(Math.random()>.5?1:-1),
        ew: e.width, eh: e.height });
    }
    function addOrbitAnim(id, radius = 150, speed = 1) {
      const e = scene.getEntity(id); if (!e) return;
      anims.set(id, { type: 'orbit', t0: timeline.currentTime, cx: e.x+e.width/2, cy: e.y+e.height/2, radius, speed });
    }
    function addPulseAnim(id, speed = 2) {
      const e = scene.getEntity(id); if (!e) return;
      anims.set(id, { type: 'pulse', t0: timeline.currentTime, baseCx: e.x+e.width/2, baseCy: e.y+e.height/2, baseW: e.width, baseH: e.height, speed });
    }
    function computeAnimations(t) {
      for (const [id, a] of anims) {
        const e = scene.getEntity(id); if (!e) { anims.delete(id); continue; }
        const dt = t - a.t0;
        switch (a.type) {
          case 'orbit': {
            const angle = dt * a.speed * Math.PI * 2;
            scene.updateEntity(id, { x: a.cx+Math.cos(angle)*a.radius-e.width/2, y: a.cy+Math.sin(angle)*a.radius-e.height/2, rotation: angle });
            break;
          }
          case 'bounce':
            scene.updateEntity(id, { x: bouncePos(a.x0, a.vx, dt, 0, SCENE_W-a.ew), y: bouncePos(a.y0, a.vy, dt, 0, SCENE_H-a.eh) });
            break;
          case 'pulse': {
            const s = 0.7 + 0.6 * Math.sin(dt * a.speed * Math.PI * 2);
            const nw = a.baseW*s, nh = a.baseH*s;
            scene.updateEntity(id, { width: nw, height: nh, x: a.baseCx-nw/2, y: a.baseCy-nh/2 });
            break;
          }
        }
      }
    }

    // ═══ Render (App pumps Frame JSON → Core) ═══
    async function renderFrame() {
      const t0 = performance.now();
      const time = timeline.currentTime;
      computeAnimations(time);

      // Sync camera entity → SDK BoundCamera
      syncCameraFromEntity();

      // SDK handles all video frame extraction automatically
      await assets.prepareVideoFrames(scene.allEntities(), time);

      // SDK: produce Frame JSON
      if (editCore) editCore.render_frame(JSON.stringify(editView.flattenAt(time)));
      if (camCore)  camCore.render_frame(JSON.stringify(camView.flattenAt(time)));
      drawOverlay();
      lastRenderMs = performance.now() - t0;
    }

    // ═══ Selection Overlay (App UI) ═══
    function drawOverlay() {
      const c = document.getElementById('selectionOverlay');
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, c.width, c.height);
      if (!selectedId) return;
      const e = scene.getEntity(selectedId); if (!e) return;

      const tl = editCamera.worldToCanvas(e.x, e.y);
      const br = editCamera.worldToCanvas(e.x + e.width, e.y + e.height);
      const pw = br.x - tl.x, ph = br.y - tl.y;
      // Center of entity in canvas pixels
      const cx = tl.x + pw / 2, cy = tl.y + ph / 2;

      ctx.save();
      const isCam = selectedId === cameraEntityId;
      ctx.strokeStyle = isCam ? '#4ecca3' : '#e94560';
      ctx.lineWidth = 2; ctx.setLineDash([6, 3]);

      // Apply entity rotation around its center
      ctx.translate(cx, cy);
      if (e.rotation) ctx.rotate(e.rotation);

      // Draw centered rectangle + handles
      ctx.strokeRect(-pw/2, -ph/2, pw, ph);
      ctx.setLineDash([]); ctx.fillStyle = ctx.strokeStyle;
      const hs = 6;
      for (const [hx, hy] of [[-pw/2,-ph/2],[pw/2,-ph/2],[-pw/2,ph/2],[pw/2,ph/2]])
        ctx.fillRect(hx-hs/2, hy-hs/2, hs, hs);

      // Label (at top-left corner, rotated with entity)
      const lbl = `${e.label||e.id}  (${Math.round(e.x)}, ${Math.round(e.y)})`;
      ctx.font = '10px Segoe UI, sans-serif';
      const tw = ctx.measureText(lbl).width;
      ctx.fillStyle = isCam ? 'rgba(78,204,163,.85)' : 'rgba(233,69,96,.85)';
      ctx.fillRect(-pw/2, -ph/2-15, tw+8, 13);
      ctx.fillStyle = '#fff'; ctx.fillText(lbl, -pw/2+4, -ph/2-4);

      if (isCam) {
        ctx.strokeStyle = 'rgba(78,204,163,.3)'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
        for (let i = 1; i < 3; i++) {
          ctx.beginPath(); ctx.moveTo(-pw/2+pw*i/3,-ph/2); ctx.lineTo(-pw/2+pw*i/3,ph/2); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-pw/2,-ph/2+ph*i/3); ctx.lineTo(pw/2,-ph/2+ph*i/3); ctx.stroke();
        }
      }
      ctx.restore();
    }

    // ═══ Main Loop (App controls frame rate) ═══
    function loop(ts) {
      requestAnimationFrame(loop);
      fpsCount++;
      if (ts - lastFpsTick >= 1000) { document.getElementById('mFps').textContent = fpsCount; fpsCount = 0; lastFpsTick = ts; }

      // SDK: advance timeline
      timeline.tick(ts);

      if (timeline.playing) {
        document.getElementById('scrubber').value = (timeline.currentTime / DURATION) * 1000;
        document.getElementById('timeDisplay').textContent = `${timeline.currentTime.toFixed(2)} / ${DURATION.toFixed(2)}`;
      }

      renderFrame();

      document.getElementById('mRender').textContent = lastRenderMs.toFixed(1) + 'ms';
      document.getElementById('mEntities').textContent = scene.entityCount();
      document.getElementById('mAnimated').textContent = anims.size;
      document.getElementById('mZoom').textContent = (editCamera.zoom * 100).toFixed(0) + '%';
    }

    // ═══ Events (App UI) ═══
    function setupEvents() {
      document.getElementById('btnAddRect').onclick = () => addEntity('rect');
      document.getElementById('btnAddCircle').onclick = () => addEntity('circle');

      document.getElementById('btnAddImage').onclick = async () => {
        const p = document.getElementById('assetUrl').value.trim();
        if (!p) return alert('Enter asset path');
        try {
          setStatus('Loading image...');
          // Use actual file path as key — matches both web cache_image() and CLI filesystem
          const asset = await assets.loadImage(p, p);
          addEntity('image', { source: p, width: asset.unitWidth, height: asset.unitHeight }, `🖼 ${p.split(/[\\/]/).pop()}`);
          setStatus(`Loaded: ${asset.pixelWidth}×${asset.pixelHeight}px → ${asset.unitWidth.toFixed(0)}×${asset.unitHeight.toFixed(0)} units`);
        } catch (e) { setStatus(`Error: ${e.message}`); }
      };

      document.getElementById('btnAddVideo').onclick = async () => {
        const p = document.getElementById('assetUrl').value.trim();
        if (!p) return alert('Enter asset path');
        try {
          setStatus('Loading video...');
          // Use actual file path as key — same path works on web and CLI
          const asset = await assets.loadVideo(p, p);
          addEntity('video', { source: p, width: asset.unitWidth, height: asset.unitHeight }, `🎬 ${p.split(/[\\/]/).pop()}`);
          setStatus(`Video: ${asset.pixelWidth}×${asset.pixelHeight}px, ${asset.duration.toFixed(1)}s`);
        } catch (e) { setStatus(`Error: ${e.message}`); }
      };

      document.getElementById('btnParticles').onclick = () => spawnParticles(parseInt(document.getElementById('particleCount').value) || 100);
      document.getElementById('btnAnimEntity').onclick = () => {
        const id = addEntity('rect', { x: SCENE_W/2-40, y: SCENE_H/2-40, width: 80, height: 80, color: [.2,.8,1,.9] }, '🔄 anim');
        const r = Math.random();
        if (r<.33) addOrbitAnim(id, 150+Math.random()*200, .5+Math.random());
        else if (r<.66) addBounceAnim(id);
        else addPulseAnim(id);
      };
      document.getElementById('btnClearAll').onclick = () => {
        for (const e of scene.allEntities()) removeEntity(e.id);
        anims.clear(); selectedId = null; nextId = 1;
        editCamera.zoom = 1; editCamera.centerX = SCENE_W/2; editCamera.centerY = SCENE_H/2;
        refreshList(); refreshProps(); createCameraEntity();
        camView.excludeIds.add(cameraEntityId);
      };
      document.getElementById('btnDelete').onclick = () => { if (selectedId) removeEntity(selectedId); };

      // Playback — SDK Timeline + Audio Sync
      document.getElementById('btnPlay').onclick = () => {
        if (timeline.playing) {
          timeline.pause();
          if (audioPreview) audioPreview.pause();
          document.getElementById('btnPlay').textContent = '▶ Play';
        } else {
          // Sync audio sources from scene before playing
          if (audioPreview) {
            audioPreview.syncVideoSources(scene);
            audioPreview.playFrom(timeline.currentTime);
          }
          timeline.play();
          document.getElementById('btnPlay').textContent = '⏸ Pause';
        }
      };
      document.getElementById('btnStop').onclick = () => {
        timeline.stop();
        if (audioPreview) audioPreview.stopAll();
        document.getElementById('btnPlay').textContent = '▶ Play';
        document.getElementById('scrubber').value = 0;
        document.getElementById('timeDisplay').textContent = `0.00 / ${DURATION.toFixed(2)}`;
      };
      document.getElementById('scrubber').oninput = (ev) => {
        if (timeline.playing) {
          timeline.pause();
          if (audioPreview) audioPreview.pause();
          document.getElementById('btnPlay').textContent = '▶ Play';
        }
        timeline.seekTo((ev.target.value / 1000) * DURATION);
        document.getElementById('timeDisplay').textContent = `${timeline.currentTime.toFixed(2)} / ${DURATION.toFixed(2)}`;
      };

      // Volume control
      document.getElementById('volumeSlider').oninput = (ev) => {
        if (audioPreview) audioPreview.setVolume(parseInt(ev.target.value) / 100);
      };
      document.getElementById('btnMute').onclick = () => {
        if (audioPreview) {
          const muted = audioPreview.toggleMute();
          document.getElementById('btnMute').textContent = muted ? '🔇' : '🔊';
        }
      };

      // Add audio clip
      document.getElementById('btnAddAudio').onclick = async () => {
        const p = document.getElementById('audioUrl').value.trim();
        if (!p) return alert('Enter audio file path');
        if (audioPreview) await audioPreview.addAudioClip(p, 0, 1.0);
      };

      // Export — open settings dialog
      document.getElementById('btnExport').onclick = () => {
        document.getElementById('exportModal').classList.add('active');
      };
      document.getElementById('btnDoExport').onclick = async () => {
        document.getElementById('exportModal').classList.remove('active');
        
        const expW = parseInt(document.getElementById('expWidth').value) || 1920;
        const expH = parseInt(document.getElementById('expHeight').value) || 1080;
        const expFps = parseInt(document.getElementById('expFps').value) || 30;
        const filename = document.getElementById('expFilename').value.trim() || `export_${Date.now()}.mp4`;
        const directory = document.getElementById('expDirectory').value.trim();
        const outputPath = directory ? `${directory.replace(/[\\/]$/, '')}/${filename}` : filename;
        const ffmpegPath = document.getElementById('expFfmpeg').value.trim() || undefined;
        const codec = document.getElementById('expCodec').value;
        const preset = document.getElementById('expPreset').value;
        const crf = parseInt(document.getElementById('expCrf').value);
        const pixFmt = document.getElementById('expPixFmt').value;
        
        setStatus('Exporting...');
        try {
          syncCameraFromEntity();
          const frames = [];
          const total = Math.round(DURATION * expFps);
          for (let i = 0; i < total; i++) {
            const t = i / expFps;
            computeAnimations(t);
            frames.push(camView.flattenForExport(t, expW, expH));
            if (i % 30 === 0) setStatus(`Frame ${i}/${total}...`);
          }
          setStatus(`Sending ${total} frames to backend...`);
          // Collect user-specified audio clips from dialog
          const audioClips = [];
          const audioPath = document.getElementById('expAudioPath').value.trim();
          if (audioPath) {
            audioClips.push({
              path: audioPath,
              start_time: parseFloat(document.getElementById('expAudioStart').value) || 0,
              volume: parseFloat(document.getElementById('expAudioVol').value) || 1.0,
              fade_in: parseFloat(document.getElementById('expAudioFadeIn').value) || 0,
              fade_out: parseFloat(document.getElementById('expAudioFadeOut').value) || 0,
            });
          }
          // Auto-extract audio from video entities (FFmpeg decodes audio track)
          const videoEntities = [...scene.allEntities()].filter(e => e.type === 'video' && e.source);
          const seenVideos = new Set();
          for (const ve of videoEntities) {
            const vpath = ve.source;
            if (!vpath || seenVideos.has(vpath)) continue;
            seenVideos.add(vpath);
            audioClips.push({
              path: vpath,
              start_time: ve.startTime ?? 0,
              duration: ve.duration ?? DURATION,
              volume: 1.0,
            });
          }
          // Include audio clips added via AudioPreview (🎵 button)
          if (audioPreview) {
            for (const clip of audioPreview.audioClips) {
              // Avoid duplicating if already added from dialog
              if (audioClips.some(c => c.path === clip.path)) continue;
              audioClips.push({
                path: clip.path,
                start_time: clip.startTime || 0,
                volume: clip.volume || 1.0,
              });
            }
          }
          const payload = {
            settings: { width: expW, height: expH, fps: expFps, background: [0,0,0,1] },
            frames,
            output: outputPath,
            ffmpeg: ffmpegPath,
            codec, crf, preset,
            pixel_format: pixFmt,
            audio_clips: audioClips.length > 0 ? audioClips : undefined,
          };
          const res = await fetch('http://localhost:8000/export', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const d = await res.json();
          setStatus(d.status === 'ok' ? `✅ ${d.path}` : `❌ ${d.error}`);
        } catch (e) { setStatus(`Export error: ${e.message}`); }
      };

      // renderScale
      document.getElementById('renderScaleSlider').oninput = (ev) => {
        renderScale = parseInt(ev.target.value) / 100;
        document.getElementById('mScale').textContent = ev.target.value + '%';
        syncEditSize(); syncCamSize();
      };

      // ── Canvas mouse (App UI) ──
      const ec = document.getElementById('editCanvas');

      ec.addEventListener('mousedown', (ev) => {
        if (ev.button === 1) {
          vpDrag = { sx: ev.clientX, sy: ev.clientY, cx0: editCamera.centerX, cy0: editCamera.centerY };
          ev.preventDefault(); return;
        }
        if (ev.button !== 0) return;

        const rect = ec.getBoundingClientRect();
        const w = editCamera.canvasToWorld(ev.clientX - rect.left, ev.clientY - rect.top);

        if (cameraEntityId) {
          const camE = scene.getEntity(cameraEntityId);
          if (camE && scene.hitTestBorder(w.x, w.y, camE, CAM_BORDER_UNITS)) {
            selectedId = cameraEntityId;
            drag = { id: cameraEntityId, sx: w.x, sy: w.y, ex: camE.x, ey: camE.y };
            refreshList(); refreshProps(); return;
          }
        }

        const hit = scene.hitTest(w.x, w.y, new Set([cameraEntityId]));
        if (hit) {
          selectedId = hit.id;
          drag = { id: hit.id, sx: w.x, sy: w.y, ex: hit.x, ey: hit.y };
          refreshList(); refreshProps(); return;
        }
        selectedId = null; drag = null;
        refreshList(); refreshProps();
      });

      ec.addEventListener('mousemove', (ev) => {
        if (vpDrag) {
          const scale = PPU * editCamera.zoom;
          editCamera.centerX = vpDrag.cx0 - (ev.clientX - vpDrag.sx) / scale;
          editCamera.centerY = vpDrag.cy0 - (ev.clientY - vpDrag.sy) / scale;
          return;
        }
        if (!drag) return;
        const rect = ec.getBoundingClientRect();
        const w = editCamera.canvasToWorld(ev.clientX - rect.left, ev.clientY - rect.top);
        scene.updateEntity(drag.id, { x: drag.ex + (w.x - drag.sx), y: drag.ey + (w.y - drag.sy) });
      });

      window.addEventListener('mouseup', () => { drag = null; vpDrag = null; splitterDrag = false; document.getElementById('splitter').classList.remove('active'); });
      ec.addEventListener('mouseleave', () => { drag = null; });

      // Zoom (centered on cursor)
      ec.addEventListener('wheel', (ev) => {
        ev.preventDefault();
        const rect = ec.getBoundingClientRect();
        const before = editCamera.canvasToWorld(ev.clientX - rect.left, ev.clientY - rect.top);
        editCamera.zoom *= ev.deltaY < 0 ? 1.1 : 1/1.1;
        editCamera.zoom = Math.max(0.1, Math.min(20, editCamera.zoom));
        const after = editCamera.canvasToWorld(ev.clientX - rect.left, ev.clientY - rect.top);
        editCamera.centerX -= (after.x - before.x);
        editCamera.centerY -= (after.y - before.y);
      }, { passive: false });

      // Splitter
      const splitter = document.getElementById('splitter');
      splitter.addEventListener('mousedown', (ev) => { splitterDrag = true; splitter.classList.add('active'); ev.preventDefault(); });
      window.addEventListener('mousemove', (ev) => {
        if (!splitterDrag) return;
        const area = document.querySelector('.viewport-area').getBoundingClientRect();
        const camW = Math.max(200, Math.min(area.width - 250, area.width - (ev.clientX - area.left)));
        document.getElementById('cameraViewportWrap').style.width = camW + 'px';
        syncEditSize(); syncCamSize();
      });

      // Resize observer
      const ro = new ResizeObserver(() => { syncEditSize(); syncCamSize(); });
      ro.observe(document.getElementById('editViewportWrap'));
      ro.observe(document.getElementById('cameraCanvasContainer'));
    }

    // ═══ Particles (App procedural animation) ═══
    function spawnParticles(n) {
      for (let i = 0; i < n; i++) {
        const t = i / n;
        const id = addEntity('rect', {
          x: SCENE_W/2 + Math.cos(t*Math.PI*2)*(200+Math.random()*400),
          y: SCENE_H/2 + Math.sin(t*Math.PI*2)*(200+Math.random()*400),
          width: 8+Math.random()*24, height: 8+Math.random()*24,
          color: [Math.random(),Math.random(),Math.random(),.4+Math.random()*.6],
          rotation: Math.random()*Math.PI*2,
          layer: 100 + scene.entityCount(),
        });
        addBounceAnim(id);
      }
      setStatus(`Spawned ${n} particles (total: ${scene.entityCount()})`);
    }

    // ═══ UI helpers ═══
    function rand(a, b) { return a + Math.random() * (b - a); }
    function rndColor() { return [.2+Math.random()*.8,.2+Math.random()*.8,.2+Math.random()*.8,1]; }
    function setStatus(s) { document.getElementById('mStatus').textContent = s; }

    function refreshList() {
      const el = document.getElementById('entityList');
      el.innerHTML = '';
      for (const e of scene.allEntities()) {
        const d = document.createElement('div');
        d.className = `entity-item${selectedId === e.id ? ' selected' : ''}`;
        const ico = anims.has(e.id) ? ' 🔄' : e.id === cameraEntityId ? ' 📷' : '';
        d.innerHTML = `<span>${e.label||e.id}${ico}</span><span class="badge">${e.type}</span>`;
        d.onclick = () => { selectedId = e.id; refreshList(); refreshProps(); };
        el.appendChild(d);
      }
    }
    function refreshProps() {
      const el = document.getElementById('propsContent');
      if (!selectedId || !scene.getEntity(selectedId)) { el.innerHTML = '<p style="font-size:9px;color:#444">Select an entity</p>'; return; }
      const e = scene.getEntity(selectedId);
      el.innerHTML = `
        <div class="prop-row"><label>X</label><input type="number" value="${e.x.toFixed(0)}" data-p="x"/></div>
        <div class="prop-row"><label>Y</label><input type="number" value="${e.y.toFixed(0)}" data-p="y"/></div>
        <div class="prop-row"><label>W</label><input type="number" value="${e.width.toFixed(0)}" data-p="width"/></div>
        <div class="prop-row"><label>H</label><input type="number" value="${e.height.toFixed(0)}" data-p="height"/></div>
        <div class="prop-row"><label>Rot</label><input type="number" step="0.1" value="${e.rotation.toFixed(2)}" data-p="rotation"/></div>
        <div class="prop-row"><label>α</label><input type="number" step="0.05" min="0" max="1" value="${e.opacity.toFixed(2)}" data-p="opacity"/></div>
        <div class="prop-row"><label>Layer</label><input type="number" step="1" min="0" value="${e.layer}" data-p="layer"/></div>`;
      el.querySelectorAll('input').forEach(inp => {
        inp.onchange = () => {
          const val = parseFloat(inp.value);
          scene.updateEntity(selectedId, { [inp.dataset.p]: inp.dataset.p === 'layer' ? Math.round(val) : val });
        };
      });
    }

    start().catch(e => { console.error(e); setStatus(`Error: ${e.message}`); });
