name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libegl1-mesa-dev \
            libatk1.0-dev libgtk-3-dev pkg-config
      - run: cargo check --workspace --exclude ifol-render-wasm --exclude ifol-render-studio

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libegl1-mesa-dev \
            libatk1.0-dev libgtk-3-dev pkg-config
      - run: cargo test --workspace --exclude ifol-render-wasm --exclude ifol-render-studio

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libegl1-mesa-dev \
            libatk1.0-dev libgtk-3-dev pkg-config
      - run: cargo clippy --workspace --exclude ifol-render-wasm --exclude ifol-render-studio -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
